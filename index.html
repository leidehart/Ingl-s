function initState(){
 if(!APP.state.started){APP.state={started:new Date().toISOString(),xp:0,streak:1,answered:0,correct:0,exams:[],certs:[],weak:{},skills:{grammar:0,vocabulary:0,listening:0,speaking:0,writing:0,conversation:0,exam:0},missions:{},voiceURI:'',rate:.88,autoVoice:true,dayOffset:0,chat:[],scenario:'cafe',testPoints:0,testStats:{earned:0,possible:0},questionLog:[],explainedQuestions:0};save();}
 APP.state.skills=APP.state.skills||{};APP.skills.forEach(s=>{APP.state.skills[s]=APP.state.skills[s]||0});
 APP.state.missions=APP.state.missions||{};APP.state.certs=APP.state.certs||[];APP.state.exams=APP.state.exams||[];APP.state.weak=APP.state.weak||{};
 APP.state.testPoints=APP.state.testPoints||0;APP.state.testStats=APP.state.testStats||{earned:0,possible:0};APP.state.questionLog=APP.state.questionLog||[];APP.state.explainedQuestions=APP.state.explainedQuestions||0;APP.state.mayaTests=APP.state.mayaTests||[];ensureLevelProgress();
}
function save(){localStorage.setItem(APP.storageKey,JSON.stringify(APP.state));}
function day(){return Math.max(1,Math.floor((new Date()-new Date(APP.state.started))/86400000)+1+(APP.state.dayOffset||0));}
function dateKey(){let d=new Date();d.setDate(d.getDate()+(APP.state.dayOffset||0));return d.toISOString().slice(0,10);}
function monthKey(){let d=new Date();d.setDate(d.getDate()+(APP.state.dayOffset||0));return d.toISOString().slice(0,7);}
function xp(){return APP.state.xp||0;}
function levelBase(id){return {'A1.1':'A1','A1.2':'A1+','A2.1':'A2','A2.2':'A2+','B1.1':'B1','B1.2':'B1+','B2.1':'B2','B2.2':'B2+','C1.1':'C1','C1.2':'C1'}[id]||String(id||'A1').split('.')[0];}
function ensureLevelProgress(){APP.state.levelProgress=APP.state.levelProgress||{};APP.levels.forEach((l,i)=>{let p=APP.state.levelProgress[l.id]||{};p.skills=p.skills||{listening:[],speaking:[],writing:[],conversation:[],exam:[]};['listening','speaking','writing','conversation','exam'].forEach(k=>p.skills[k]=p.skills[k]||[]);p.gateAttempts=p.gateAttempts||[];p.bestGate=p.bestGate||0;p.tests=p.tests||0;p.pointsEarned=p.pointsEarned||0;p.pointsPossible=p.pointsPossible||0;p.passed=!!p.passed;p.unlocked=i===0||!!(APP.state.levelProgress[APP.levels[i-1].id]&&APP.state.levelProgress[APP.levels[i-1].id].passed);APP.state.levelProgress[l.id]=p;});}
function currentLevelIndex(){ensureLevelProgress();let idx=APP.levels.findIndex(l=>!APP.state.levelProgress[l.id].passed);return idx<0?APP.levels.length-1:idx;}
function level(){return APP.levels[currentLevelIndex()];}
function nextLevel(){return APP.levels[Math.min(currentLevelIndex()+1,APP.levels.length-1)];}
function isLevelUnlocked(id){ensureLevelProgress();return !!APP.state.levelProgress[id]?.unlocked;}
function lp(id){ensureLevelProgress();return APP.state.levelProgress[id];}
function avgScore(arr){return arr&&arr.length?Math.round(arr.reduce((a,b)=>a+(b.score||0),0)/arr.length):0;}
function levelSkillScore(id,skill){return avgScore(lp(id).skills[skill]||[]);}
function levelRequirements(id){let p=lp(id),req={exam:p.bestGate||0,listening:levelSkillScore(id,'listening'),speaking:levelSkillScore(id,'speaking'),writing:levelSkillScore(id,'writing'),conversation:levelSkillScore(id,'conversation')};req.ready=req.exam>=75&&req.listening>=60&&req.speaking>=60&&req.writing>=60&&req.conversation>=60;return req;}
function levelCompletionPct(id){let r=levelRequirements(id);return Math.round((Math.min(r.exam/75,1)+Math.min(r.listening/60,1)+Math.min(r.speaking/60,1)+Math.min(r.writing/60,1)+Math.min(r.conversation/60,1))/5*100);}
function recordLevelSkill(skill,levelId,earned,possible,meta={}){let id=levelId||level().id,p=lp(id),score=possible?Math.round((earned/possible)*100):0;p.skills[skill]=p.skills[skill]||[];p.skills[skill].push({score,earned,possible,date:new Date().toISOString(),title:meta.title||skill});p.skills[skill]=p.skills[skill].slice(-20);p.pointsEarned=(p.pointsEarned||0)+(earned||0);p.pointsPossible=(p.pointsPossible||0)+(possible||0);p.tests=(p.tests||0)+1;if(skill==='exam'&&meta.gate){p.gateAttempts.push({score,earned,possible,date:new Date().toISOString(),title:meta.title||'Prova de fase'});p.gateAttempts=p.gateAttempts.slice(-10);p.bestGate=Math.max(p.bestGate||0,score);}updateLevelPass(id);save();}
function updateLevelPass(id){let p=lp(id),r=levelRequirements(id);if(r.ready&&!p.passed){p.passed=true;p.passedDate=new Date().toISOString();p.levelBonusGiven=true;APP.state.xp=xp()+150;let idx=APP.levels.findIndex(l=>l.id===id);if(APP.levels[idx+1])lp(APP.levels[idx+1].id).unlocked=true;toast(`Parabéns! Você passou de ${id} e desbloqueou o próximo level. +150 XP`);}}
function gateMetric(label,value,need){return `<div class="gate-metric"><strong class="small">${esc(label)}</strong><div class="progress"><div class="bar" style="width:${Math.min(100,Math.round(value/need*100))}%"></div></div><span class="small"><strong>${value}%</strong></span></div>`;}
function gateSummary(id){let r=levelRequirements(id);return `<div class="gate-box"><strong>Critérios para passar de fase</strong>${gateMetric('Prova',r.exam,75)}${gateMetric('Audição',r.listening,60)}${gateMetric('Fala',r.speaking,60)}${gateMetric('Escrita',r.writing,60)}${gateMetric('Maya',r.conversation,60)}<p class="small muted">Para desbloquear o próximo level: prova de fase ≥75% e média mínima de 60% em ouvir, falar, escrever e conversar com a Maya.</p></div>`;}

function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function addXP(n,reason=''){APP.state.xp=xp()+n;save();renderDashboard();renderLevels();if(reason)toast(`+${n} XP — ${reason}`);}function addSkill(skill,n){APP.state.skills[skill]=Math.min(100,(APP.state.skills[skill]||0)+n);save();}
function toast(t){let el=document.createElement('div');el.textContent=t;el.style.cssText='position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#ffbf4d;color:#111;padding:12px 16px;border-radius:999px;font-weight:1000;box-shadow:0 15px 35px rgba(0,0,0,.35);z-index:99';document.body.appendChild(el);setTimeout(()=>el.remove(),1900);}
function setupNav(){document.getElementById('nav').innerHTML=APP.tabs.map(([id,label])=>`<button data-tab="${id}" class="${id==='dashboard'?'active':''}">${label}</button>`).join('');document.getElementById('nav').addEventListener('click',e=>{let b=e.target.closest('button[data-tab]');if(!b)return;showTab(b.dataset.tab);});}
function showTab(id){document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id===id));window.scrollTo({top:0,behavior:'smooth'});}
function progressPct(){return levelCompletionPct(level().id);}
function tag(text,type=''){return `<span class="tag ${type}">${esc(text)}</span>`;}
function missionState(){let k=dateKey();APP.state.missions[k]=APP.state.missions[k]||{};return APP.state.missions[k];}
function completedMinutes(){let ms=missionState();return APP.dailyMissions.filter(m=>ms[m.id]).reduce((a,m)=>a+m.minutes,0);}
function completedCount(){let ms=missionState();return APP.dailyMissions.filter(m=>ms[m.id]).length;}
function expressionOfDay(){let start=(day()-1)%APP.expressions.length;return [APP.expressions[start],APP.expressions[(start+1)%APP.expressions.length],APP.expressions[(start+2)%APP.expressions.length]];}
function renderDashboard(){let cur=level(),next=nextLevel(),pct=progressPct(),mins=completedMinutes(),done=completedCount(),req=levelRequirements(cur.id);document.getElementById('todayPill').innerHTML=`Dia <strong>${day()}</strong> • level atual <strong>${cur.id}</strong> • ${xp()} XP`;let weak=Object.entries(APP.state.weak||{}).sort((a,b)=>b[1]-a[1]).slice(0,4);document.getElementById('dashboard').innerHTML=`
 <div class="grid two"><div class="card"><p>${tag('Seu level atual: '+cur.id,'warn')} ${tag('Meta diária: 40 min')}</p><h2><span class="spark">🚀</span> Rota de hoje</h2><div class="big">${mins}/40 min</div><p class="muted">Para avançar para <strong>${next.id}</strong>, você precisa ir bem na prova de fase e praticar ouvir, falar, escrever e conversar.</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><p class="small muted">${pct}% dos critérios deste level concluídos.</p><div class="row"><button class="btn" onclick="showTab('daily')">Fazer 40 minutos</button><button class="btn secondary" onclick="startLevelGate('${cur.id}')">Prova do level ${cur.id}</button><button class="btn pink" onclick="startMayaTest()">Testar conversa com Maya</button></div></div>
 <div class="card"><h2>Aprendizado rápido + divertido</h2><p>O app combina CEFR, prática comunicativa, revisão espaçada, microtestes, fala com voz feminina, escrita corrigida e simulados mensais. A regra é simples: <strong>todos os dias, 40 minutos</strong>.</p><div class="quote">8 min teste rápido + 8 min audição + 10 min fala + 8 min escrita + 6 min conversa.</div>${gateSummary(cur.id)}<p class="footer-note">Simulados IELTS/TOEFL medem evolução. A certificação oficial real precisa ser feita nos exames oficiais.</p></div></div>
 <div class="grid four" style="margin-top:16px"><div class="kpi"><span class="muted">Missões hoje</span><strong>${done}/5</strong></div><div class="kpi"><span class="muted">Progresso do level</span><strong>${pct}%</strong></div><div class="kpi"><span class="muted">Prova da fase</span><strong>${req.exam}%</strong></div><div class="kpi"><span class="muted">Pontos em testes</span><strong>${APP.state.testPoints||0}</strong></div><div class="kpi"><span class="muted">Pontos fracos</span><strong>${weak.length?weak.map(w=>w[0]).join(', '):'—'}</strong></div></div>
 <div class="grid two" style="margin-top:16px"><div class="card"><h2>3 expressões de nativos para hoje</h2>${expressionOfDay().map(e=>`<div class="feedback"><strong>${esc(e.term)}</strong><p class="muted">${esc(e.meaning)}</p><code>${esc(e.example)}</code></div>`).join('')}</div><div class="card"><h2>Evolução por habilidade</h2>${APP.skills.map(s=>skillBar(s)).join('')}<button class="btn secondary" onclick="showTab('review')">Ver histórico completo</button></div></div>`;}
function skillBar(s){let v=Math.round(APP.state.skills[s]||0);return `<div class="skillbar"><span class="small">${esc(skillLabel(s))}</span><div class="progress"><div class="bar" style="width:${v}%"></div></div><strong>${v}%</strong></div>`;}
function skillLabel(s){return {grammar:'Gramática',vocabulary:'Vocabulário',listening:'Audição',speaking:'Fala',writing:'Escrita',conversation:'Conversa',exam:'Provas'}[s]||s;}
function renderDaily(){let ms=missionState(),mins=completedMinutes();document.getElementById('daily').innerHTML=`<div class="card"><h2>Plano obrigatório de 40 minutos por dia</h2><p class="muted">Marque as missões conforme fizer. O app salva seu progresso no navegador.</p><div class="progress"><div class="bar" style="width:${Math.min(100,Math.round(mins/40*100))}%"></div></div><p>${tag(mins+'/40 min','warn')} ${mins>=40?tag('meta concluída!'):tag('faltam '+Math.max(0,40-mins)+' min','bad')}</p><div class="grid five"></div><div class="grid two">${APP.dailyMissions.map(m=>`<div class="card mission ${ms[m.id]?'done':''}" onclick="${m.action}"><div class="emoji">${m.emoji}</div><h3>${m.title}</h3><p class="muted small">${m.desc}</p><div>${tag(m.minutes+' min')} ${tag('+'+m.xp+' XP','warn')}</div><div class="row" style="margin-top:12px"><button class="btn tiny" onclick="event.stopPropagation();completeMission('${m.id}')">Marcar feito</button><button class="btn tiny secondary" onclick="event.stopPropagation();${m.action}">Abrir treino</button></div></div>`).join('')}</div></div>`;}
function completeMission(id){let m=APP.dailyMissions.find(x=>x.id===id);let ms=missionState();if(!ms[id]){ms[id]=true;addXP(m.xp,m.title);addSkill(id==='quick'?'exam':id==='chat'?'conversation':id==='listen'?'listening':id==='speak'?'speaking':id==='write'?'writing':'exam',5);save();}renderAll(false);}
function renderLevels(){ensureLevelProgress();let cur=level();document.getElementById('levels').innerHTML=`<div class="card"><h2>Todas as fases do inglês — A1 até C1</h2><p class="muted">Agora cada level tem evolução própria. O próximo level só desbloqueia quando você atingir os critérios: prova de fase ≥75% + prática mínima em audição, fala, escrita e conversa com Maya.</p>${APP.levels.map((l,i)=>{let p=lp(l.id),unlocked=isLevelUnlocked(l.id),passed=p.passed,pct=levelCompletionPct(l.id),r=levelRequirements(l.id);return `<div class="level-row ${unlocked?'unlocked':'locked'} ${cur.id===l.id?'current':''}"><div class="badge">${l.id}</div><div><strong>${l.title}</strong><p class="muted small">${l.desc}</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><div class="score-row"><span class="score-chip">${pct}% do level</span><span class="score-chip">prova ${r.exam}%</span><span class="score-chip">Maya ${r.conversation}%</span><span class="score-chip">${passed?'aprovado':unlocked?'em estudo':'bloqueado'}</span></div><div class="level-actions"><button class="btn tiny" onclick="startLevelGate('${l.id}')" ${!unlocked||passed?'disabled':''}>Prova de mudança</button><button class="btn tiny secondary" onclick="showTab('listening')" ${!unlocked||passed?'disabled':''}>Treinar ouvir</button><button class="btn tiny secondary" onclick="showTab('speaking')" ${!unlocked||passed?'disabled':''}>Treinar fala</button><button class="btn tiny secondary" onclick="showTab('writing')" ${!unlocked||passed?'disabled':''}>Treinar escrita</button><button class="btn tiny secondary" onclick="startMayaTest()" ${!unlocked||passed?'disabled':''}>Teste Maya</button></div></div><div class="small">${passed?'✅':unlocked?'🔓':'🔒'}</div></div>`}).join('')}</div>`;}
function renderPlan(){document.getElementById('plan').innerHTML=`<div class="card"><h2>Plano CEFR de 20 semanas</h2><p class="muted">Estrutura inspirada em cursos comunicativos: objetivo claro, uso real do idioma, feedback, repetição espaçada, produção oral/escrita e avaliação periódica.</p><div class="table-wrap"><table class="table"><thead><tr><th>Semana</th><th>Nível</th><th>Foco</th><th>Você precisa conseguir</th><th>Conteúdo</th></tr></thead><tbody>${APP.syllabus.map(s=>`<tr><td>${s.week}</td><td>${s.level}</td><td>${s.theme}</td><td>${s.goal}</td><td><strong>${s.grammar}</strong><br><span class="muted small">${s.vocab}</span></td></tr>`).join('')}</tbody></table></div></div>`;}
function trainingCard(t){return `<div class="card training-card" onclick="startExam('${t.id}')"><div class="emoji">${t.emoji}</div><h3>${t.title}</h3><p class="muted small">${t.desc}</p><div>${tag(t.level)} ${tag(t.area,'warn')}</div><div class="meta"><span class="small muted">${t.count} questões • pontuação contabilizada</span><strong>${t.xp} XP</strong></div></div>`;}
function renderTraining(){document.getElementById('training').innerHTML=`<div class="card"><h2>Testes rápidos, provas e avaliação quinzenal</h2><p class="muted">Cada teste conta pontos, registra histórico e explica todas as questões como uma mini aula: regra, estrutura, uso natural, vocabulário-chave e por que cada alternativa está certa ou errada.</p><div class="score-row"><span class="score-chip">🏅 ${APP.state.testPoints||0} pontos em testes</span><span class="score-chip">📚 ${APP.state.explainedQuestions||0} questões explicadas</span></div><div class="grid three">${APP.trainings.map(t=>trainingCard(t)).join('')}</div></div><div id="examMount" style="margin-top:16px"></div>`;}
function levelRank(l){return {A1:1,'A1+':2,A2:3,'A2+':4,B1:5,'B1+':6,B2:7,'B2+':8,C1:9}[l]||5;}
function questionPoints(q,t){let base={A1:8,'A1+':9,A2:10,'A2+':12,B1:14,'B1+':16,B2:18,'B2+':20,C1:24}[q.level]||12;let mult=t&&t.id==='monthly-cert'?1.5:t&&t.id==='biweekly'?1.35:t&&t.id==='placement'?1.25:t&&t.id==='quick'?1:1.15;return Math.round(base*mult);}
function maxExamPoints(ex){return ex.qs.reduce((sum,q)=>sum+questionPoints(q,ex.training),0);}
function examEarnedPoints(ex){return ex.answers.reduce((sum,a)=>sum+(a.earned||0),0);}
function statPct(){let st=APP.state.testStats||{earned:0,possible:0};return st.possible?Math.round(st.earned/st.possible*100):0;}
function shortSkillName(s){return {grammar:'gramática',vocabulary:'vocabulário',listening:'audição',speaking:'fala',writing:'escrita',conversation:'conversação',reading:'leitura',exam:'prova'}[s]||s;}
function keywordFocus(q){let text=(q.opts[q.ans]+' '+(q.structure||'')).replace(/[“”"'.,!?;:()]/g,' ');let words=[...new Set(text.split(/\s+/).filter(w=>w.length>2&&!['the','and','you','this','that','with','have','has','are','was','were','would','could','should'].includes(w.toLowerCase())))];return words.slice(0,7).join(', ')||'observe a frase correta inteira';}
function optionReason(q,idx){if(idx===q.ans)return `Correta: combina com a regra “${esc(q.grammar)}” e segue a estrutura ${esc(q.structure)}.`;let o=q.opts[idx];if(/am|is|are|be/.test(o)&&/be/i.test(q.grammar))return 'Errada: o verbo be precisa concordar com o sujeito: I am, you/we/they are, he/she/it is.';if(/do|does|don’t|doesn’t/i.test(q.structure+q.grammar))return 'Errada: em perguntas e negativas no Simple Present, use do/does e mantenha o verbo principal na base.';if(/can|could|should|must|modal/i.test(q.grammar))return 'Errada: depois de modal use verbo base, sem “to”, sem “-ing” e sem passado.';if(/past/i.test(q.grammar)||/Yesterday/i.test(q.text))return 'Errada: quando a ideia está no passado, o verbo e o estado também precisam ir para o passado.';if(/connector|however|although|because|so|contrast/i.test(q.grammar+q.exp))return 'Errada: o conector precisa mostrar a relação lógica correta entre as ideias: razão, resultado ou contraste.';if(/formal|email|request/i.test(q.grammar+q.natural))return 'Errada: em inglês profissional, o pedido precisa ser claro e educado, não direto demais.';return 'Errada: não segue a estrutura esperada para soar correto e natural em inglês.';}
function miniLessonHTML(q){return `<div class="mini-lesson"><div class="lesson-box"><div class="explain-title">Área estudada</div><p>${esc(q.area)} • ${esc(shortSkillName(q.skill||'grammar'))} • nível ${esc(q.level)}</p></div><div class="lesson-box"><div class="explain-title">Regra principal</div><p><strong>${esc(q.grammar)}</strong><br>${esc(q.exp)}</p></div><div class="lesson-box"><div class="explain-title">Estrutura para memorizar</div><p><code>${esc(q.structure)}</code></p></div><div class="lesson-box"><div class="explain-title">Uso natural</div><p>${esc(q.natural)}</p></div><div class="lesson-box"><div class="explain-title">Vocabulário-chave</div><p>${esc(keywordFocus(q))}</p></div><div class="lesson-box"><div class="explain-title">Como treinar agora</div><p>Crie 2 frases suas usando a mesma estrutura. Depois fale em voz alta e troque uma palavra para ganhar flexibilidade.</p></div></div>`;}
function fullExplanationHTML(q,selected,ok,earned,possible){let options=q.opts.map((o,idx)=>`<li><strong>${String.fromCharCode(65+idx)}) ${esc(o)}</strong><br><span class="muted small">${optionReason(q,idx)}</span></li>`).join('');return `<div class="feedback"><div class="${ok?'correct-text':'wrong-text'}">${ok?'Acertou! Excelente.':'Errou, mas isso virou aprendizado.'}</div><div class="score-row"><span class="score-chip">+${earned}/${possible} pontos da questão</span><span class="score-chip">${esc(shortSkillName(q.skill||'grammar'))}</span><span class="score-chip">${esc(q.level)}</span></div><p><strong>Sua resposta:</strong> ${selected===null?'—':String.fromCharCode(65+selected)+') '+esc(q.opts[selected])}</p><p><strong>Resposta certa:</strong> ${String.fromCharCode(65+q.ans)}) ${esc(q.opts[q.ans])}</p>${miniLessonHTML(q)}<div class="explain-title">Análise de todas as alternativas</div><ol class="option-analysis">${options}</ol></div>`;}
function logQuestionResult(item){APP.state.testPoints=(APP.state.testPoints||0)+(item.earned||0);APP.state.testStats=APP.state.testStats||{earned:0,possible:0};APP.state.testStats.earned=(APP.state.testStats.earned||0)+(item.earned||0);APP.state.testStats.possible=(APP.state.testStats.possible||0)+(item.possible||0);APP.state.explainedQuestions=(APP.state.explainedQuestions||0)+1;APP.state.questionLog=APP.state.questionLog||[];APP.state.questionLog.unshift({...item,date:new Date().toISOString()});APP.state.questionLog=APP.state.questionLog.slice(0,250);save();} 
function filterQuestions(trainingId){let q=[...APP.questions];let curRank=levelRank(level().id.split('.')[0]);if(trainingId==='quick')return pick(q.filter(x=>levelRank(x.level)<=Math.max(3,curRank+1)),10);if(trainingId==='placement')return pick(q,30);if(trainingId==='verbs-basic')return pick(q.filter(x=>x.area==='verbos'||x.skill==='grammar'),20);if(trainingId==='tenses')return pick(q.filter(x=>x.area==='tempos verbais'||x.area==='complexo'),22);if(trainingId==='sentence-structure')return pick(q.filter(x=>x.area==='estrutura'||x.area==='escrita'),20);if(trainingId==='natural-vocab')return pick(q.filter(x=>x.area==='vocabulário natural'),18);if(trainingId==='conversation-scenarios')return pick(q.filter(x=>x.area==='conversação'||x.skill==='conversation'||x.skill==='speaking'),18);if(trainingId==='mixed-hard')return pick(q.filter(x=>['B2','B2+','C1'].includes(x.level)||x.area==='complexo'||x.area==='escrita'),26);if(trainingId==='biweekly'){let week=Math.ceil(day()/7);let maxLevel=week<4?3:week<8?5:week<12?6:week<16?7:9;return pick(q.filter(x=>levelRank(x.level)<=maxLevel),28)}if(trainingId==='monthly-cert')return pick(q.filter(x=>['certificação','escrita','filmes/listening','complexo'].includes(x.area)||['reading','listening','speaking','writing','exam'].includes(x.skill)),34);return pick(q,20);}
function pick(arr,n){let base=arr.length?arr:[...APP.questions];let copy=[...base].sort(()=>Math.random()-.5);while(copy.length<n){copy.push(...base.sort(()=>Math.random()-.5));}return copy.slice(0,n);}
function levelQuestionLevel(id){return levelBase(id);}
function filterLevelGateQuestions(levelId){let target=levelQuestionLevel(levelId),rank=levelRank(target),pool=APP.questions.filter(q=>levelRank(q.level)<=rank&&levelRank(q.level)>=Math.max(1,rank-2));let exact=APP.questions.filter(q=>q.level===target);pool=[...exact,...pool.filter(q=>!exact.includes(q))];return pick(pool,14);}
function startLevelGate(levelId){ensureLevelProgress();if(!isLevelUnlocked(levelId)){toast('Este level ainda está bloqueado. Passe pelo level anterior primeiro.');return;}if(lp(levelId).passed){toast('Você já passou deste level. Continue no próximo.');return;}let t={id:'level-gate-'+levelId,emoji:'🔐',title:'Prova de mudança de fase '+levelId,desc:'Só libera o próximo level se você for bem.',area:'mudança de fase',level:levelId,count:14,xp:95,gateLevel:levelId};exam={training:t,qs:filterLevelGateQuestions(levelId),i:0,answers:[],checked:false,selected:null,score:0,start:Date.now()};showTab('training');setTimeout(()=>renderExam(),50);}

function startExam(id){let t=APP.trainings.find(x=>x.id===id)||APP.trainings[0];exam={training:t,qs:filterQuestions(id),i:0,answers:[],checked:false,selected:null,score:0,start:Date.now()};showTab('training');setTimeout(()=>renderExam(),50);}
function renderExam(){let mount=document.getElementById('examMount');if(!mount){renderTraining();mount=document.getElementById('examMount')}let q=exam.qs[exam.i];let done=exam.i,total=exam.qs.length;let possible=maxExamPoints(exam),earned=examEarnedPoints(exam),qPts=questionPoints(q,exam.training);mount.innerHTML=`<div class="exam-shell"><div class="row" style="justify-content:space-between"><div>${tag(exam.training.level)} ${tag(exam.training.area,'warn')}</div><div class="pill">Questão ${exam.i+1}/${total}</div></div><h2>${exam.training.emoji} ${exam.training.title}</h2><div class="score-row"><span class="score-chip">🏅 ${earned}/${possible} pontos no teste</span><span class="score-chip">Esta questão vale ${qPts} pontos</span><span class="score-chip">${esc(shortSkillName(q.skill||'grammar'))}</span></div><div class="progress"><div class="bar" style="width:${Math.round((done/total)*100)}%"></div></div><div class="question-title">${esc(q.text)}</div><div id="options">${q.opts.map((o,idx)=>`<div class="option ${exam.selected===idx?'selected':''}" onclick="selectOption(${idx})"><strong>${String.fromCharCode(65+idx)})</strong> ${esc(o)}</div>`).join('')}</div><div id="feedbackBox"></div><div class="row" style="margin-top:14px"><button class="btn" onclick="checkAnswer()" ${exam.selected===null||exam.checked?'disabled':''}>Responder e ver aula</button><button class="btn good" onclick="nextQuestion()" ${!exam.checked?'disabled':''}>${exam.i===total-1?'Finalizar prova':'Próxima'}</button><button class="btn secondary" onclick="cancelExam()">Sair</button></div></div>`;mount.scrollIntoView({behavior:'smooth',block:'start'});}
function selectOption(idx){if(exam.checked)return;exam.selected=idx;renderExam();}
function checkAnswer(){let q=exam.qs[exam.i];exam.checked=true;let ok=exam.selected===q.ans;let possible=questionPoints(q,exam.training),earned=ok?possible:0;if(ok)exam.score++;let answerRecord={id:q.id,area:q.area,skill:q.skill||'grammar',level:q.level,ok,selected:exam.selected,selectedText:q.opts[exam.selected],correctText:q.opts[q.ans],earned,possible,explanation:q.exp,grammar:q.grammar,structure:q.structure,natural:q.natural};exam.answers.push(answerRecord);APP.state.answered=(APP.state.answered||0)+1;if(ok){APP.state.correct=(APP.state.correct||0)+1;addSkill(q.skill||'grammar',1.8)}else{APP.state.weak[q.area]=(APP.state.weak[q.area]||0)+1;}logQuestionResult({title:q.text,area:q.area,skill:q.skill||'grammar',level:q.level,ok,earned,possible,selected:q.opts[exam.selected],correct:q.opts[q.ans],explanation:q.exp,grammar:q.grammar,structure:q.structure,natural:q.natural,test:exam.training.title});let opts=[...document.querySelectorAll('.option')];opts.forEach((el,idx)=>{if(idx===q.ans)el.classList.add('correct');if(idx===exam.selected&&idx!==q.ans)el.classList.add('wrong');});document.getElementById('feedbackBox').innerHTML=fullExplanationHTML(q,exam.selected,ok,earned,possible);document.querySelector('.exam-shell .btn').disabled=true;document.querySelector('.exam-shell .btn.good').disabled=false;}
function nextQuestion(){if(exam.i>=exam.qs.length-1){finishExam();return;}exam.i++;exam.checked=false;exam.selected=null;renderExam();}
function estimatedCEFR(pct){if(pct<35)return 'A1';if(pct<50)return 'A2';if(pct<67)return 'B1';if(pct<82)return 'B2';return 'C1';}
function finishExam(){let total=exam.qs.length,score=exam.score,pct=Math.round(score/total*100),pointsEarned=examEarnedPoints(exam),pointsPossible=maxExamPoints(exam),pointPct=pointsPossible?Math.round(pointsEarned/pointsPossible*100):0,xpGain=Math.round(exam.training.xp*(pointPct/100));let areas={};exam.answers.forEach(a=>{areas[a.area]=areas[a.area]||{ok:0,total:0,earned:0,possible:0};areas[a.area].total++;areas[a.area].earned+=a.earned||0;areas[a.area].possible+=a.possible||0;if(a.ok)areas[a.area].ok++;});let cefr=estimatedCEFR(pointPct);let record={date:new Date().toISOString(),title:exam.training.title,score,total,pct,pointsEarned,pointsPossible,pointPct,xp:xpGain,cefr,answers:exam.answers,gateLevel:exam.training.gateLevel||''};APP.state.exams.push(record);if(exam.training.id==='monthly-cert'){APP.state.certs.push({...record,month:monthKey()});}if(exam.training.id==='quick')completeMissionSilent('quick');addSkill('exam',pointPct>=70?6:3);let gateId=exam.training.gateLevel||level().id;if(exam.training.gateLevel){recordLevelSkill('exam',gateId,pointsEarned,pointsPossible,{gate:true,title:exam.training.title});}else{recordLevelSkill('exam',gateId,pointsEarned,pointsPossible,{title:exam.training.title});}APP.state.xp=xp()+xpGain;save();toast(`+${xpGain} XP — prova concluída`);let rows=Object.entries(areas).map(([a,v])=>`<tr><td>${a}</td><td>${v.ok}/${v.total}</td><td>${v.earned}/${v.possible}</td><td>${Math.round(v.earned/Math.max(1,v.possible)*100)}%</td></tr>`).join('');let certNote=exam.training.id==='monthly-cert'?`<div class="feedback"><strong>Estimativa mensal: ${cefr}</strong><p>Este é um simulado de acompanhamento inspirado em IELTS/TOEFL. Ele não emite certificação oficial; use o resultado para decidir quando agendar uma prova oficial.</p></div>`:'';let gateNote=exam.training.gateLevel?`<div class="feedback"><strong>Resultado da mudança de fase ${exam.training.gateLevel}: ${pointPct>=75?'prova aprovada':'prova ainda abaixo da meta'}</strong><p>Mesmo com a prova aprovada, o próximo level só abre quando também houver prática suficiente de audição, fala, escrita e teste com Maya.</p>${gateSummary(exam.training.gateLevel)}</div>`:'';let retryAction=exam.training.gateLevel?`startLevelGate('${exam.training.gateLevel}')`:`startExam('${exam.training.id}')`;document.getElementById('examMount').innerHTML=`<div class="card"><h2>Resultado da prova</h2><div class="big">${pointPct}%</div><div class="score-row"><span class="score-chip">🏅 ${pointsEarned}/${pointsPossible} pontos</span><span class="score-chip">✅ ${score}/${total} acertos</span><span class="score-chip">📈 ${cefr}</span><span class="score-chip">+${xpGain} XP</span></div><p>A nota principal usa pontos por dificuldade. Questões de níveis mais altos valem mais, mas todas recebem explicação completa.</p>${certNote}${gateNote}<table class="table"><thead><tr><th>Área</th><th>Acertos</th><th>Pontos</th><th>% por pontos</th></tr></thead><tbody>${rows}</tbody></table><div class="row" style="margin-top:14px"><button class="btn" onclick="${retryAction}">Refazer</button><button class="btn secondary" onclick="showTab('review')">Ver evolução e explicações</button></div></div>`;exam=null;renderDashboard();renderLevels();}
function cancelExam(){exam=null;let m=document.getElementById('examMount');if(m)m.innerHTML='';}
function renderWriting(){document.getElementById('writing').innerHTML=`<div class="card"><h2>Treino de escrita com correção</h2><p class="muted">Escolha um prompt, escreva em inglês e receba feedback de tamanho, conectores, possíveis erros e próxima meta.</p><div class="grid two">${APP.writingPrompts.map((p,i)=>`<div class="card"><p>${tag(p.level)} ${tag(p.focus,'warn')}</p><h3>${esc(p.title)}</h3><p>${esc(p.task)}</p><textarea id="write${i}" placeholder="Write in English here..."></textarea><div class="row"><button class="btn" onclick="scoreWriting(${i})">Corrigir escrita</button><button class="btn secondary" onclick="speakText(document.getElementById('write${i}').value)">Ouvir meu texto</button></div><div id="writeFb${i}"></div></div>`).join('')}</div></div>`;}
function detectMistakes(txt){let t=' '+txt.toLowerCase()+' ';let c=[];if(/\bi am agree\b/.test(t))c.push({bad:'I am agree',good:'I agree',why:'“agree” is a verb, so we do not use “am”.'});if(/\bi no\b/.test(t))c.push({bad:'I no + verb',good:"I don’t + verb",why:'Use “don’t” to make a negative sentence in the present.'});if(/\bpeople is\b/.test(t))c.push({bad:'people is',good:'people are',why:'“People” is plural.'});if(/\bmore better\b/.test(t))c.push({bad:'more better',good:'better',why:'“Better” already means “more good”.'});if(/\bcan to\b/.test(t))c.push({bad:'can to',good:'can + verb',why:'After “can”, use the base verb without “to”.'});if(/\bshould to\b/.test(t))c.push({bad:'should to',good:'should + verb',why:'After “should”, use the base verb without “to”.'});if(/\byesterday[^.?!]*\bgo\b/.test(t))c.push({bad:'yesterday + go',good:'yesterday + went',why:'Use past verbs with “yesterday”.'});return c.slice(0,4);}
function scoreWriting(i){let p=APP.writingPrompts[i],txt=document.getElementById('write'+i).value.trim(),words=txt?txt.split(/\s+/).length:0;let mistakes=detectMistakes(txt);let connectors=(txt.match(/(because|but|so|although|however|therefore|for example|nevertheless|on the other hand)/gi)||[]).length;let score=Math.min(100,Math.round((words/p.min)*45+connectors*10+(mistakes.length?15:35)));let xpGain=score>=70?22:10;let possible=30,earned=Math.round(possible*score/100);logQuestionResult({title:p.title,area:'writing',skill:'writing',level:p.level,ok:score>=70,earned,possible,selected:txt||'sem texto',correct:p.task,explanation:'A escrita é avaliada por tamanho mínimo, conectores, clareza e erros comuns. O objetivo é formar frases completas, com ideia + detalhe + exemplo.',grammar:p.focus,structure:'sentence → connector → reason/example',natural:'Use frases claras; em níveis B2/C1, acrescente conectores e exemplos específicos.',test:'Escrita com correção'});recordLevelSkill('writing',level().id,earned,possible,{title:p.title});let fb=`<div class="feedback"><strong>${score>=70?'Good writing!':'Good start — keep improving.'}</strong><div class="score-row"><span class="score-chip">+${earned}/${possible} pontos</span><span class="score-chip">${score}% escrita</span><span class="score-chip">conta para o level ${level().id}</span></div><p>Words: ${words}/${p.min}. Connectors: ${connectors}. Estimated score: ${score}%.</p>`;if(mistakes.length){fb+=`<div class="explain-title">Corrections</div>${mistakes.map(m=>`<p><span class="wrong-text">${esc(m.bad)}</span> → <span class="correct-text">${esc(m.good)}</span><br><span class="muted small">${esc(m.why)} Great effort — continue!</span></p>`).join('')}`;}else{fb+=`<p class="correct-text">No common beginner mistake detected. Try adding richer examples and clearer connectors.</p>`;}fb+=`<div class="explain-title">Mini aula</div><p><strong>Foco:</strong> ${esc(p.focus)}. Em inglês, escreva uma ideia principal, depois explique com <code>because</code>, <code>so</code> ou <code>however</code> e finalize com um exemplo. Isso cria clareza e prepara para IELTS/TOEFL writing.</p><p><strong>Next step:</strong> ${esc(p.focus)}.</p></div>`;document.getElementById('writeFb'+i).innerHTML=fb;addSkill('writing',score>=70?6:3);completeMissionSilent('write');addXP(xpGain,'escrita');renderLevels();}
function renderListening(){document.getElementById('listening').innerHTML=`<div class="card"><h2>Audição com voz feminina</h2><p class="muted">Toque em ouvir, responda em inglês e compare com a resposta modelo. A voz depende das vozes disponíveis no celular/navegador.</p><div class="grid two">${APP.listeningItems.map((it,i)=>`<div class="card"><p>${tag(it.level)} ${tag(it.title,'warn')}</p><p class="muted small">${esc(it.text)}</p><button class="btn" onclick="speakText(${JSON.stringify(it.text).replace(/"/g,'&quot;')})">Ouvir</button><div style="margin-top:12px"><strong>${esc(it.ask)}</strong><input class="input" id="listenAns${i}" placeholder="Type your answer in English" style="margin-top:8px"><button class="btn secondary" style="margin-top:8px" onclick="checkListening(${i})">Corrigir</button><div id="listenFb${i}"></div></div></div>`).join('')}</div></div>`;}
function speakText(text){if(!text)return;if(!('speechSynthesis'in window)){toast('Seu navegador não tem voz automática.');return;}let u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=APP.state.rate||.88;let voices=speechSynthesis.getVoices();let selected=voices.find(v=>v.voiceURI===APP.state.voiceURI)||voices.find(v=>/female|woman|samantha|zira|victoria|karen|susan|google us english/i.test(v.name))||voices.find(v=>/en-US|en_GB|English/i.test(v.lang||v.name));if(selected)u.voice=selected;speechSynthesis.cancel();speechSynthesis.speak(u);}
function checkListening(i){let it=APP.listeningItems[i],ans=(document.getElementById('listenAns'+i).value||'').toLowerCase();let hits=it.keywords.filter(k=>ans.includes(k.toLowerCase())).length;let ok=hits>0||it.answer.toLowerCase().split(/\s+/).some(w=>w.length>4&&ans.includes(w));let possible=14,earned=ok?14:4;logQuestionResult({title:it.ask,area:'listening',skill:'listening',level:it.level,ok,earned,possible,selected:ans||'sem resposta',correct:it.answer,explanation:'Em listening, primeiro entenda a ideia principal e depois procure palavras-chave. A resposta não precisa ser idêntica, mas precisa carregar o mesmo sentido.',grammar:'Listening comprehension',structure:'preview → listen for keywords → answer with meaning',natural:'Responda com uma frase curta e clara em inglês.',test:'Audição ativa'});recordLevelSkill('listening',level().id,earned,possible,{title:it.title});document.getElementById('listenFb'+i).innerHTML=`<div class="feedback"><strong class="${ok?'correct-text':'wrong-text'}">${ok?'Great listening!':'Almost. Listen again.'}</strong><div class="score-row"><span class="score-chip">+${earned}/${possible} pontos</span><span class="score-chip">listening</span><span class="score-chip">conta para o level ${level().id}</span></div><p><strong>Model answer:</strong> <code>${esc(it.answer)}</code></p><p><strong>Keywords:</strong> ${it.keywords.join(', ')}.</p><div class="explain-title">Como aprender com esta questão</div><p>Ouça novamente procurando primeiro as palavras principais, não palavra por palavra. Depois repita a resposta em voz alta para treinar audição e fala juntas.</p></div>`;addSkill('listening',ok?5:2);completeMissionSilent('listen');addXP(ok?14:6,ok?'listening':'tentativa de listening');renderLevels();}
function renderSpeaking(){document.getElementById('speaking').innerHTML=`<div class="card"><h2>Fala com avaliação</h2><p class="muted">Ouça a pergunta em voz feminina, grave sua resposta ou digite, e receba feedback de palavras-chave e estrutura.</p><div class="grid two">${APP.speakingPrompts.map((p,i)=>`<div class="card"><p>${tag(p.level)} ${tag(p.scenario,'warn')}</p><h3>${esc(p.prompt)}</h3><p class="muted small">${esc(p.tip)}</p><button class="btn" onclick="speakText(${JSON.stringify(p.prompt).replace(/"/g,'&quot;')})">Ouvir pergunta</button><button class="btn secondary" onclick="startSpeech(${i})">Gravar resposta</button><textarea id="speechText${i}" placeholder="Your speaking transcript appears here. You can also type." style="margin-top:10px"></textarea><button class="btn good" onclick="scoreSpeech(${i})">Avaliar fala</button><div id="speechFb${i}"></div></div>`).join('')}</div></div>`;}
function startSpeech(i){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Reconhecimento de fala não disponível neste navegador.');return;}let rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.onresult=e=>{document.getElementById('speechText'+i).value=e.results[0][0].transcript;};rec.onerror=()=>toast('Não consegui captar. Tente em local silencioso.');rec.start();}
function scoreSpeech(i){let p=APP.speakingPrompts[i],txt=(document.getElementById('speechText'+i).value||'').toLowerCase();let hits=p.keywords.filter(k=>txt.includes(k.toLowerCase())).length;let pct=Math.min(100,Math.round(hits/Math.max(1,Math.min(p.keywords.length,5))*100));let mistakes=detectMistakes(txt);let xpGain=pct>=60?20:8;let possible=25,earned=Math.round(possible*pct/100);logQuestionResult({title:p.prompt,area:'speaking',skill:'speaking',level:p.level,ok:pct>=60,earned,possible,selected:txt||'sem fala registrada',correct:p.tip,explanation:'A fala é avaliada por palavras-chave, frase completa e adequação à situação. Para evoluir, responda com answer + reason + example.',grammar:p.tip,structure:'answer → because → example/question',natural:'Fale em frases curtas no começo. Depois aumente com detalhes e conectores.',test:'Fala guiada'});recordLevelSkill('speaking',level().id,earned,possible,{title:p.scenario});document.getElementById('speechFb'+i).innerHTML=`<div class="feedback"><strong>${pct>=60?'Nice speaking!':'Good effort — try again.'}</strong><div class="score-row"><span class="score-chip">+${earned}/${possible} pontos</span><span class="score-chip">${pct}% speaking</span><span class="score-chip">conta para o level ${level().id}</span></div><p>Keywords found: ${hits}/${p.keywords.length}. Score: ${pct}%.</p><p><strong>Focus:</strong> ${esc(p.tip)}</p><div class="explain-title">Mini aula de fala</div><p>Use uma frase completa, acrescente um motivo com <code>because</code> e finalize com um exemplo. Isso melhora fluência, organização e preparação para speaking tests.</p>${mistakes.length?mistakes.map(m=>`<p><span class="wrong-text">${esc(m.bad)}</span> → <span class="correct-text">${esc(m.good)}</span><br><span class="muted small">${esc(m.why)}</span></p>`).join(''):'<p class="muted small">Try to speak in complete sentences: answer + reason + example.</p>'}</div>`;addSkill('speaking',pct>=60?6:3);completeMissionSilent('speak');addXP(xpGain,'speaking');renderLevels();}
function scenarioOptions(){return Object.keys(APP.scenarios).map(k=>`<option value="${k}" ${APP.state.scenario===k?'selected':''}>${k}</option>`).join('');}
function initialCafeMessage(){return 'Hi! I’m Maya. We just met in a cozy coffee shop. What would you like to order?';}
function mayaTestPrompt(){let sc=APP.state.scenario||'cafe';let data={cafe:{q:'We are in a cafeteria. What would you like to order and why?',keywords:['would like','coffee','tea','please','because']},food:{q:'You are in a restaurant. Order food, ask one question, and ask for the bill.',keywords:['would like','menu','bill','please','could']},shopping:{q:'You are shopping. Ask for size, price, and say what you want.',keywords:['size','price','how much','want','medium']},work:{q:'Tell me about one work problem and ask me for help politely.',keywords:['problem','help','could','because','task']},relationship:{q:'Tell me politely what you need in a healthy relationship.',keywords:['feel','need','honest','support','time']},routine:{q:'Tell me your routine and when you study English.',keywords:['usually','morning','work','study','night']},travel:{q:'Tell me about a travel plan and one possible problem at the airport.',keywords:['travel','flight','airport','delayed','need']}};return data[sc]||data.cafe;}
function startMayaTest(){let p=mayaTestPrompt();APP.state.mayaTest={scenario:APP.state.scenario||'cafe',question:p.q,keywords:p.keywords,date:new Date().toISOString()};APP.state.chat=APP.state.chat||[];APP.state.chat.push({role:'bot',text:`Maya test time! Listen, speak or write your answer. Question: ${p.q}`});save();showTab('conversation');renderConversation();setTimeout(()=>speakText(p.q),200);}
function recordMayaTest(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Reconhecimento de fala não disponível. Você pode escrever sua resposta.');return;}let rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.onresult=e=>{let el=document.getElementById('mayaTestAnswer');if(el)el.value=e.results[0][0].transcript;};rec.onerror=()=>toast('Não consegui captar. Tente em local silencioso.');rec.start();}
function scoreMayaTest(){let test=APP.state.mayaTest||mayaTestPrompt(),txt=(document.getElementById('mayaTestAnswer')?.value||'').trim(),low=txt.toLowerCase();let keys=test.keywords||mayaTestPrompt().keywords,hits=keys.filter(k=>low.includes(k.toLowerCase())).length,words=txt?txt.split(/\s+/).length:0;let mistakes=detectMistakes(txt);let pct=Math.min(100,Math.round((hits/Math.max(1,keys.length))*60+Math.min(words,50)));if(!txt)pct=0;let possible=35,earned=Math.round(possible*pct/100);recordLevelSkill('conversation',level().id,earned,possible,{title:'Teste Maya '+(test.scenario||APP.state.scenario)});logQuestionResult({title:'Teste de conversa com Maya',area:'conversation',skill:'conversation',level:level().id,ok:pct>=60,earned,possible,selected:txt||'sem resposta',correct:'Answer the question with a complete sentence, a reason and a follow-up question.',explanation:'A conversa é avaliada por compreensão da pergunta, palavras-chave, frase completa, clareza e capacidade de continuar o diálogo.',grammar:'conversation: answer + reason + question',structure:'answer → because → detail → question back',natural:'Em conversa real, responda e devolva uma pergunta simples para manter o diálogo.',test:'Maya conversation test'});APP.state.mayaTests=APP.state.mayaTests||[];APP.state.mayaTests.unshift({date:new Date().toISOString(),scenario:test.scenario||APP.state.scenario,score:pct,earned,possible,text:txt,level:level().id});APP.state.mayaTests=APP.state.mayaTests.slice(0,50);let correction=mistakes.length?mistakes.map(m=>`<p><span class="wrong-text">${esc(m.bad)}</span> → <span class="correct-text">${esc(m.good)}</span><br><span class="muted small">${esc(m.why)}</span></p>`).join(''):'<p class="correct-text">No common beginner mistake detected. Try adding one question at the end.</p>';let fb=`<div class="feedback"><strong>${pct>=60?'Great conversation test!':'Good effort — try again with a fuller answer.'}</strong><div class="score-row"><span class="score-chip">+${earned}/${possible} pontos</span><span class="score-chip">${pct}% Maya</span><span class="score-chip">level ${level().id}</span></div><p><strong>Question:</strong> ${esc(test.question||mayaTestPrompt().q)}</p><p><strong>Your answer:</strong> ${esc(txt||'—')}</p><p><strong>Keywords:</strong> ${keys.join(', ')}. You used ${hits}/${keys.length}.</p><div class="explain-title">Mini aula de conversa</div><p>Para conversar bem, use: <code>short answer + because + detail + question</code>. Exemplo: “I would like coffee, please, because I am tired. What do you recommend?”</p>${correction}</div>`;let box=document.getElementById('mayaTestFeedback');if(box)box.innerHTML=fb;APP.state.chat=APP.state.chat||[];APP.state.chat.push({role:'user',text:txt||'(no answer)'});APP.state.chat.push({role:'bot',text:`Your Maya conversation score is ${pct}%. Good job! Try to answer with a reason and ask me one question. What would you like to practice next?`});save();addSkill('conversation',pct>=60?7:3);completeMissionSilent('chat');addXP(pct>=60?18:8,'teste Maya');renderConversation();renderLevels();}
function renderConversation(){let chat=APP.state.chat||[],test=APP.state.mayaTest||mayaTestPrompt();document.getElementById('conversation').innerHTML=`<div class="grid two"><div class="card"><h2>Conversar com a Maya ☕</h2><p class="muted">Regras da Maya: responde em inglês simples, termina com pergunta, corrige erros com incentivo e usa voz feminina automaticamente quando ativado.</p><div class="row"><label style="min-width:160px">Situação<select id="scenarioSel" onchange="APP.state.scenario=this.value;save();resetScenario()">${scenarioOptions()}</select></label><button class="btn secondary" onclick="resetScenario()">Começar situação</button><button class="btn secondary" onclick="speakText(document.getElementById('chatBox').innerText)">Ouvir conversa</button></div><div class="chat" id="chatBox">${chat.length?chat.map(m=>`<div class="msg ${m.role==='user'?'user':'bot'}">${esc(m.text)}</div>`).join(''):`<div class="msg bot">${esc(initialCafeMessage())}</div>`}</div><div class="row" style="margin-top:10px"><input class="input" id="chatInput" placeholder="Write in English..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn" onclick="sendChat()">Enviar</button><button class="btn secondary" onclick="recordChat()">Falar</button><button class="btn secondary" onclick="clearChat()">Limpar</button></div></div><div class="card"><h2>Teste de conversação com Maya 🎙️</h2><p class="muted">Este teste conta para passar de level. Você ouve a pergunta, responde falando ou escrevendo, e recebe pontuação.</p><div class="test-panel"><p>${tag('level '+level().id,'warn')} ${tag(APP.state.scenario||'cafe')}</p><h3>${esc(test.question||mayaTestPrompt().q)}</h3><div class="row"><button class="btn" onclick="startMayaTest()">Iniciar/gerar pergunta</button><button class="btn secondary" onclick="speakText((APP.state.mayaTest&&APP.state.mayaTest.question)||mayaTestPrompt().q)">Ouvir pergunta</button><button class="btn secondary" onclick="recordMayaTest()">Responder falando</button></div><textarea id="mayaTestAnswer" placeholder="Speak or write your answer in English..."></textarea><button class="btn good" onclick="scoreMayaTest()">Avaliar conversa</button><div id="mayaTestFeedback"></div></div><p class="footer-note">A pontuação considera palavras-chave, frase completa, clareza e uma pergunta de volta para manter a conversa.</p></div></div>`;}
function startCafe(){APP.state.scenario='cafe';APP.state.chat=[{role:'bot',text:initialCafeMessage()}];save();showTab('conversation');renderConversation();setTimeout(()=>speakText(initialCafeMessage()),250);}
function resetScenario(){let sc=APP.state.scenario||'cafe';let first=sc==='cafe'?initialCafeMessage():`Hi! I’m Maya. Let’s practice a ${sc} situation. ${APP.scenarios[sc][0]}`;APP.state.chat=[{role:'bot',text:first}];save();renderConversation();if(APP.state.autoVoice)setTimeout(()=>speakText(first),150);}
function mayaReply(text){let t=text.toLowerCase();let corrections=detectMistakes(text);let sc=APP.state.scenario||'cafe';let qs=APP.scenarios[sc]||APP.scenarios.cafe;let q=qs[Math.floor(Math.random()*qs.length)];let praise=['Great try!','Nice answer!','Good job!','You are improving!'][Math.floor(Math.random()*4)];let topic='';if(sc==='cafe')topic='You can say: “I would like a coffee, please.”';if(sc==='food')topic='Useful phrase: “Could I have the bill, please?”';if(sc==='shopping')topic='Useful phrase: “Do you have this in medium?”';if(sc==='work')topic='Useful phrase: “Could you help me with this task?”';if(sc==='relationship')topic='Useful phrase: “I feel... and I need...”';if(sc==='routine')topic='Useful phrase: “I usually study at night.”';if(sc==='travel')topic='Useful phrase: “My flight was delayed.”';let correctionText=corrections.length?` Small correction: ${corrections.map(m=>`You wrote “${m.bad}”. Say “${m.good}” because ${m.why}`).join(' ')}`:'';return `${praise}${correctionText} ${topic} ${q}`;}
function sendChat(){let input=document.getElementById('chatInput'),text=(input.value||'').trim();if(!text)return;APP.state.chat=APP.state.chat||[];APP.state.chat.push({role:'user',text});let reply=mayaReply(text);APP.state.chat.push({role:'bot',text:reply});input.value='';let words=text.split(/\s+/).filter(Boolean).length,score=Math.min(100,30+words*7-(detectMistakes(text).length*10));recordLevelSkill('conversation',level().id,Math.round(10*score/100),10,{title:'Chat livre Maya'});addSkill('conversation',4);save();renderConversation();completeMissionSilent('chat');addXP(7,'conversa');setTimeout(()=>{let box=document.getElementById('chatBox');if(box)box.scrollTop=box.scrollHeight;if(APP.state.autoVoice)speakText(reply);},100);}
function recordChat(){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Reconhecimento de fala não disponível.');return;}let rec=new SR();rec.lang='en-US';rec.onresult=e=>{document.getElementById('chatInput').value=e.results[0][0].transcript;sendChat();};rec.start();}
function clearChat(){APP.state.chat=[];save();renderConversation();}
function completeMissionSilent(id){let ms=missionState();if(!ms[id]){ms[id]=true;save();}}
function renderCertification(){let certs=APP.state.certs||[],doneThis=certs.some(c=>c.month===monthKey());document.getElementById('certification').innerHTML=`<div class="grid two"><div class="card"><h2>Simulado mensal IELTS/TOEFL 🏆</h2><p class="muted">Todo mês, faça um simulado oficial-like para acompanhar sua evolução em reading, listening, speaking e writing. Ele estima CEFR e registra histórico.</p><p>${tag(monthKey(),'warn')} ${doneThis?tag('simulado do mês feito'):tag('pendente','bad')}</p><button class="btn" onclick="startExam('monthly-cert')">Fazer simulado mensal</button><p class="footer-note">Este app não emite IELTS/TOEFL oficial. Ele prepara e mede evolução; a certificação reconhecida exige inscrição na prova oficial.</p></div><div class="card"><h2>Estrutura de acompanhamento</h2><p>${tag('Reading')} ${tag('Listening')} ${tag('Speaking')} ${tag('Writing')}</p><p>Resultado sugerido por faixa: abaixo de 35% = A1, 35–49% = A2, 50–66% = B1, 67–81% = B2, 82%+ = C1.</p><div class="quote">Meta mensal: subir a pontuação ou reduzir erros nos pontos fracos, não “decorar” respostas.</div></div></div><div class="card" style="margin-top:16px"><h2>Histórico de simulados mensais</h2>${certs.length?`<table class="table"><thead><tr><th>Mês</th><th>Data</th><th>Resultado</th><th>Pontos</th><th>Estimativa</th><th>XP</th></tr></thead><tbody>${certs.slice().reverse().map(c=>`<tr><td>${esc(c.month)}</td><td>${new Date(c.date).toLocaleDateString('pt-BR')}</td><td>${c.score}/${c.total} (${c.pct}%)</td><td>${c.pointsEarned||0}/${c.pointsPossible||0} (${c.pointPct||c.pct}%)</td><td>${c.cefr}</td><td>${c.xp}</td></tr>`).join('')}</tbody></table>`:'<p class="muted">Nenhum simulado mensal feito ainda.</p>'}</div>`;}
function renderReview(){let exams=APP.state.exams||[],weak=Object.entries(APP.state.weak||{}).sort((a,b)=>b[1]-a[1]),log=APP.state.questionLog||[],st=APP.state.testStats||{earned:0,possible:0};let levelRows=APP.levels.map(l=>{let r=levelRequirements(l.id),pct=levelCompletionPct(l.id),p=lp(l.id);return `<tr><td>${l.id}</td><td>${pct}%</td><td>${r.exam}%</td><td>${r.listening}%</td><td>${r.speaking}%</td><td>${r.writing}%</td><td>${r.conversation}%</td><td>${p.passed?'Aprovado':isLevelUnlocked(l.id)?'Em estudo':'Bloqueado'}</td></tr>`}).join('');let reviewList=log.slice(0,12).map(q=>`<div class="review-item"><div class="row" style="justify-content:space-between"><strong>${esc(q.title)}</strong><span>${q.ok?tag('certo'):tag('revisar','bad')}</span></div><div class="score-row"><span class="score-chip">${q.earned||0}/${q.possible||0} pontos</span><span class="score-chip">${esc(q.level||'')}</span><span class="score-chip">${esc(shortSkillName(q.skill||q.area))}</span></div><p><strong>Correto:</strong> ${esc(q.correct||'')}</p><p class="muted small"><strong>Explicação:</strong> ${esc(q.explanation||'')}</p><p class="muted small"><strong>Estrutura:</strong> ${esc(q.structure||q.grammar||'')}</p></div>`).join('');document.getElementById('review').innerHTML=`<div class="grid two"><div class="card"><h2>Avaliação quinzenal</h2><p class="muted">A cada 14 dias, faça uma prova cumulativa. Ela mistura gramática, vocabulário natural, estrutura, listening/reading e situações reais.</p><p>${tag('Dia '+day())} ${tag(day()%14===0?'Dia ideal de avaliação':'pode simular quando quiser','warn')}</p><button class="btn" onclick="startExam('biweekly')">Fazer avaliação quinzenal</button><div class="score-row"><span class="score-chip">🏅 ${APP.state.testPoints||0} pontos acumulados</span><span class="score-chip">${st.earned||0}/${st.possible||0} pontos possíveis</span><span class="score-chip">${statPct()}% geral</span></div></div><div class="card"><h2>Pontos fracos</h2>${weak.length?weak.map(w=>`<p>${tag(w[0],'bad')} errou ${w[1]} vez(es) — faça treino específico.</p>`).join(''):'<p class="muted">Ainda não há pontos fracos. Faça um teste para gerar revisão.</p>'}<button class="btn secondary" onclick="resetWeak()">Zerar pontos fracos</button></div></div><div class="card" style="margin-top:16px"><h2>Evolução por level</h2><p class="muted">O próximo level só abre quando todos os critérios mínimos forem atingidos.</p><div class="table-wrap"><table class="table"><thead><tr><th>Level</th><th>Total</th><th>Prova</th><th>Ouvir</th><th>Falar</th><th>Escrever</th><th>Maya</th><th>Status</th></tr></thead><tbody>${levelRows}</tbody></table></div></div><div class="grid two" style="margin-top:16px"><div class="card"><h2>Habilidades gerais</h2>${APP.skills.map(s=>skillBar(s)).join('')}</div><div class="card"><h2>Histórico de provas</h2>${exams.length?`<table class="table"><thead><tr><th>Data</th><th>Prova</th><th>Acertos</th><th>Pontos</th><th>CEFR</th></tr></thead><tbody>${exams.slice().reverse().slice(0,10).map(e=>`<tr><td>${new Date(e.date).toLocaleDateString('pt-BR')}</td><td>${esc(e.title)}</td><td>${e.score}/${e.total} (${e.pct}%)</td><td>${e.pointsEarned||0}/${e.pointsPossible||0} (${e.pointPct||e.pct}%)</td><td>${e.cefr}</td></tr>`).join('')}</tbody></table>`:'<p class="muted">Nenhuma prova feita ainda.</p>'}</div></div><div class="card" style="margin-top:16px"><h2>Últimas questões explicadas</h2><p class="muted">Aqui fica seu caderno automático de estudo. Cada questão respondida vira revisão com resposta correta, regra e estrutura.</p>${reviewList||'<p class="muted">Responda um teste para gerar explicações aqui.</p>'}</div>`;}
function resetWeak(){APP.state.weak={};save();renderReview();}
function renderSettings(){let voices=window.speechSynthesis?speechSynthesis.getVoices():[];document.getElementById('settings').innerHTML=`<div class="card"><h2>Voz feminina e preferências</h2><label>Voz feminina / voz em inglês disponível no seu aparelho</label><select id="voiceSelect" onchange="APP.state.voiceURI=this.value;save()"><option value="">Automática</option>${voices.map(v=>`<option value="${esc(v.voiceURI)}" ${APP.state.voiceURI===v.voiceURI?'selected':''}>${esc(v.name)} — ${esc(v.lang)}</option>`).join('')}</select><label>Velocidade da voz: <span id="rateLabel">${APP.state.rate||.88}</span></label><input type="range" min="0.6" max="1.2" step="0.05" value="${APP.state.rate||.88}" oninput="APP.state.rate=Number(this.value);document.getElementById('rateLabel').textContent=this.value;save()"><label><input type="checkbox" ${APP.state.autoVoice?'checked':''} onchange="APP.state.autoVoice=this.checked;save()"> Maya fala automaticamente em voz feminina</label><div class="row" style="margin-top:14px"><button class="btn" onclick="speakText('Hi, I am Maya. Let us practice English together today.')">Testar voz</button><button class="btn secondary" onclick="APP.state.dayOffset+=1;save();renderAll()">Simular próximo dia</button><button class="btn danger" onclick="if(confirm('Apagar todo o progresso?')){localStorage.removeItem(APP.storageKey);location.reload()}">Zerar progresso</button></div><p class="footer-note">Microfone e voz dependem do navegador. Chrome/Android costuma funcionar melhor; em iPhone, as vozes variam conforme o sistema.</p></div>`;}
function renderAll(reRenderExam=true){renderDashboard();renderDaily();renderLevels();renderPlan();renderTraining();renderWriting();renderListening();renderSpeaking();renderConversation();renderCertification();renderReview();renderSettings();if(exam&&reRenderExam)renderExam();}
initState();setupNav();renderAll();if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=()=>renderSettings();}
window.startExam=startExam;window.startLevelGate=startLevelGate;window.showTab=showTab;window.selectOption=selectOption;window.checkAnswer=checkAnswer;window.nextQuestion=nextQuestion;window.cancelExam=cancelExam;window.speakText=speakText;window.checkListening=checkListening;window.startSpeech=startSpeech;window.scoreSpeech=scoreSpeech;window.scoreWriting=scoreWriting;window.sendChat=sendChat;window.clearChat=clearChat;window.resetWeak=resetWeak;window.completeMission=completeMission;window.startCafe=startCafe;window.resetScenario=resetScenario;window.recordChat=recordChat;window.startMayaTest=startMayaTest;window.recordMayaTest=recordMayaTest;window.scoreMayaTest=scoreMayaTest;
</script>
</body>
