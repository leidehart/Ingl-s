  <style>

    main{max-width:1220px;margin:0 auto;padding:20px 16px 90px}.tab{display:none}.tab.active{display:block;animation:fade .18s ease}@keyframes fade{from{opacity:.2;transform:translateY(8px)}to{opacity:1;transform:none}}
    .grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}@media(max-width:920px){.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}.topbar{align-items:flex-start}.hide-mobile{display:none}}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.083),rgba(255,255,255,.04));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.card h2,.card h3{margin:0 0 10px;letter-spacing:-.025em}.muted{color:var(--muted)}.small{font-size:13px}.big{font-size:clamp(32px,8vw,58px);font-weight:1000;letter-spacing:-.07em;margin:8px 0}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.divider{height:1px;background:var(--line);margin:18px 0}.center{text-align:center}
    .progress{height:14px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;border:1px solid var(--line)}.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent),var(--pink));border-radius:999px;transition:width .35s ease}.skillbar{display:grid;grid-template-columns:105px 1fr 42px;gap:10px;align-items:center;margin:9px 0}
    .btn{border:0;background:linear-gradient(135deg,var(--accent),#ffd66f);color:#161616;border-radius:15px;padding:12px 14px;font-weight:1000;cursor:pointer;box-shadow:0 10px 24px rgba(255,191,77,.18)}.btn.secondary{background:rgba(255,255,255,.085);color:var(--text);border:1px solid var(--line);box-shadow:none}.btn.good{background:linear-gradient(135deg,var(--accent2),#b9fff2)}.btn.pink{background:linear-gradient(135deg,var(--pink),var(--violet));color:white}.btn.danger{background:var(--bad)}.btn:disabled{opacity:.45;cursor:not-allowed}.btn.block{width:100%;text-align:center}.btn.tiny{padding:8px 10px;border-radius:12px;font-size:12px}
    .input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.20);color:var(--text);border-radius:15px;padding:12px;font:inherit}textarea{min-height:120px;resize:vertical}label{display:block;margin:8px 0 6px;font-weight:850}
    .level-row{display:grid;grid-template-columns:88px 1fr auto;gap:12px;align-items:center;padding:13px;border-radius:19px;background:rgba(255,255,255,.047);border:1px solid var(--line);margin:9px 0}.badge{background:var(--panel2);border:1px solid var(--line);padding:9px 10px;border-radius:13px;font-weight:1000;text-align:center}.level-row.unlocked .badge{background:rgba(126,244,223,.17);color:var(--accent2)}.level-row.current{outline:2px solid var(--accent)}
    .kpi{padding:14px;border:1px solid var(--line);border-radius:19px;background:rgba(255,255,255,.047)}.kpi strong{font-size:28px;display:block;letter-spacing:-.04em}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;background:rgba(126,244,223,.12);color:var(--accent2);border:1px solid rgba(126,244,223,.25);font-size:12px;font-weight:900;margin:3px}.tag.warn{background:rgba(255,191,77,.12);color:var(--accent);border-color:rgba(255,191,77,.25)}.tag.bad{background:rgba(255,141,141,.12);color:var(--bad);border-color:rgba(255,141,141,.25)}.tag.pink{background:rgba(255,112,184,.12);color:#ffb9dc;border-color:rgba(255,112,184,.26)}
    .training-card,.mission{position:relative;overflow:hidden;cursor:pointer;transition:.16s transform,.16s background}.training-card:hover,.mission:hover{transform:translateY(-2px);background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.045))}.emoji{font-size:34px}.meta{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-top:12px}.mission.done{outline:2px solid var(--good)}.mission.done:after{content:"✓";position:absolute;right:14px;top:10px;color:#111;background:var(--good);font-weight:1000;border-radius:999px;width:28px;height:28px;display:grid;place-items:center}
    .exam-shell{border:1px solid var(--line);border-radius:25px;background:rgba(0,0,0,.15);padding:16px}.question-title{font-size:clamp(20px,5vw,28px);font-weight:1000;letter-spacing:-.03em;margin:8px 0 14px}.option{display:block;margin:10px 0;padding:13px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.055);cursor:pointer;transition:.12s}.option:hover{background:rgba(255,255,255,.09)}.option.selected{outline:2px solid var(--accent);background:rgba(255,191,77,.14)}.option.correct{outline:2px solid var(--good);background:rgba(135,247,166,.12)}.option.wrong{outline:2px solid var(--bad);background:rgba(255,141,141,.12)}.feedback{margin-top:12px;padding:13px;border-radius:17px;border:1px solid var(--line);background:rgba(255,255,255,.055)}.correct-text{color:var(--good);font-weight:1000}.wrong-text{color:var(--bad);font-weight:1000}.explain-title{font-weight:1000;color:var(--accent2);margin-top:8px}.score-chip{display:inline-flex;gap:6px;align-items:center;border-radius:999px;padding:7px 10px;background:rgba(255,191,77,.13);border:1px solid rgba(255,191,77,.34);font-weight:1000;color:var(--accent);margin:4px 4px 4px 0}.mini-lesson{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}.lesson-box{border:1px solid var(--line);border-radius:15px;background:rgba(0,0,0,.16);padding:10px}.option-analysis{margin:8px 0 0;padding-left:20px}.option-analysis li{margin:8px 0}.score-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:9px 0}.review-item{border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.045);padding:12px;margin:10px 0}.gate-box{border:1px solid var(--line);border-radius:17px;background:rgba(0,0,0,.16);padding:12px;margin-top:10px}.gate-metric{display:grid;grid-template-columns:110px 1fr 52px;gap:10px;align-items:center;margin:8px 0}.locked{opacity:.58;filter:saturate(.65)}.level-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.test-panel{border:1px solid rgba(255,191,77,.3);background:rgba(255,191,77,.08);border-radius:22px;padding:14px;margin-top:14px}@media(max-width:760px){.mini-lesson{grid-template-columns:1fr}.gate-metric{grid-template-columns:1fr}}
    .table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:16px}.table th,.table td{border-bottom:1px solid var(--line);padding:11px;text-align:left;vertical-align:top}.table th{color:var(--accent2);font-size:13px}.table tr:last-child td{border-bottom:0}.table-wrap{overflow-x:auto}
    .chat{height:390px;overflow-y:auto;border:1px solid var(--line);border-radius:21px;padding:12px;background:rgba(0,0,0,.15)}.msg{max-width:88%;margin:10px 0;padding:11px 12px;border-radius:18px;line-height:1.42}.bot{background:rgba(126,244,223,.14);border:1px solid rgba(126,244,223,.25)}.user{background:rgba(255,191,77,.16);border:1px solid rgba(255,191,77,.25);margin-left:auto}.footer-note{color:var(--muted);font-size:12px;margin-top:14px}code{background:rgba(0,0,0,.30);padding:2px 5px;border-radius:6px}.quote{border-left:4px solid var(--accent);padding:10px 14px;background:rgba(255,191,77,.08);border-radius:12px}.spark{display:inline-block;animation:bounce 1.9s infinite}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
  </style>
</head>

  {id:5,area:'tempos verbais',skill:'grammar',level:'A1',text:'Complete: I ___ English every day.',opts:['studies','study','studying','am study'],ans:1,exp:'Com I usamos o verbo base no Simple Present.',grammar:'Simple Present',structure:'I + base verb + complement.',natural:'“I study English every day.”'},
  {id:6,area:'conversação',skill:'conversation',level:'A1',text:'At a café, the server asks: “What would you like?” Best answer:',opts:['I would like tea, please.','I am tea.','Yes, like.','Tea me please.'],ans:0,exp:'Use “I would like...” para pedir.',grammar:'Polite requests',structure:'I would like + item + please.',natural:'“Could I have tea, please?” também é natural.'},
  {id:7,area:'tempos verbais',skill:'grammar',level:'A2',text:'Choose the best sentence for “Ontem eu dormi muito porque estava cansada.”',opts:['Yesterday I sleep a lot because I am tired.','Yesterday I slept a lot because I was tired.','Yesterday I was sleep a lot because I tired.','Yesterday I sleeping so much because I was tired.'],ans:1,exp:'Yesterday pede passado: slept. Estado no passado: was tired.',grammar:'Simple Past',structure:'Yesterday + subject + past verb + because + subject + was/were + adjective.',natural:'“I slept a lot” soa natural; evite “slept very much”.'},
  {id:8,area:'vocabulário natural',skill:'vocabulary',level:'A2',text:'Most natural way to say “quero melhorar minha fala”: ',opts:['I want to grow my speak.','I want to improve my speaking.','I want to increase my speak.','I want to make bigger my speech.'],ans:1,exp:'Speaking pode ser a habilidade. Speak é verbo.',grammar:'Verb + object',structure:'I want to + verb + object.',natural:'Use “improve my speaking” ou “work on my pronunciation”.'},
  {id:9,area:'tempos verbais',skill:'grammar',level:'A2',text:'Tomorrow, I ___ study for 40 minutes.',opts:['go','went','am going to','was going'],ans:2,exp:'Tomorrow indica futuro planejado. Use be going to.',grammar:'Future with going to',structure:'subject + am/is/are going to + verb.',natural:'“I’m going to study tonight.”'},
  {id:10,area:'estrutura',skill:'grammar',level:'A2',text:'Choose the correct negative sentence.',opts:['I no like spicy food.','I don’t like spicy food.','I doesn’t like spicy food.','I not like spicy food.'],ans:1,exp:'Negativa no Simple Present com I usa don’t + verbo base.',grammar:'Simple Present negative',structure:'I + don’t + base verb.',natural:'“I don’t really like spicy food.”'},
  {id:11,area:'conversação',skill:'conversation',level:'A2',text:'You are shopping. Choose the best question.',opts:['How much is this?','How many this cost?','What price this?','How much this is?'],ans:0,exp:'Para perguntar preço: How much is this?',grammar:'Question word order',structure:'How much + is + this?',natural:'Também: “How much does this cost?”'},
  {id:12,area:'verbos',skill:'grammar',level:'A2',text:'Past of “go”: ',opts:['goed','went','gone','goes'],ans:1,exp:'Go é irregular: go → went → gone.',grammar:'Irregular verbs',structure:'Yesterday, I went home.',natural:'“I went to the gym after work.”'},
  {id:13,area:'tempos verbais',skill:'grammar',level:'A2+',text:'I have lived here ___ 2020.',opts:['for','since','during','ago'],ans:1,exp:'Since marca ponto inicial; for marca duração.',grammar:'Present Perfect with since/for',structure:'have/has + participle + since + point in time.',natural:'“for three years”, “since 2020”.'},
  {id:14,area:'estrutura',skill:'grammar',level:'A2+',text:'Choose the best connector.',opts:['I was tired because I slept early.','I was tired, so I slept early.','I was tired but I slept early because yes.','I was tired when I slept because early.'],ans:1,exp:'So mostra resultado: estava cansada, então dormiu cedo.',grammar:'Connectors',structure:'reason + so + result.',natural:'“I was exhausted, so I went to bed early.”'},
  {id:15,area:'vocabulário natural',skill:'vocabulary',level:'A2+',text:'“I’m into podcasts” means:',opts:['Eu estou dentro de podcasts.','Eu curto podcasts.','Eu odeio podcasts.','Eu faço podcasts profissionalmente.'],ans:1,exp:'Be into = gostar/ter interesse em algo.',grammar:'Expression',structure:'be into + noun/verb-ing.',natural:'“I’m really into English podcasts.”'},
  {id:16,area:'conversação',skill:'conversation',level:'A2+',text:'At work, your colleague says “Can you send me the file?” Best answer:',opts:['Yes, I can send it now.','Yes, I send yesterday.','No, I can to send.','I sending it now.'],ans:0,exp:'Depois de can, use verbo base.',grammar:'Modal can',structure:'can + base verb.',natural:'“Sure, I’ll send it now.”'},
  {id:17,area:'tempos verbais',skill:'grammar',level:'B1',text:'Choose the best sentence.',opts:['I was watching a movie when my friend called.','I watched a movie when my friend was call.','I am watching a movie when my friend called yesterday.','I was watch a movie when my friend called.'],ans:0,exp:'Past Continuous mostra ação em andamento; Simple Past interrompe.',grammar:'Past Continuous + Simple Past',structure:'was/were + verb-ing + when + simple past.',natural:'Muito comum para narrar cenas.'},
  {id:18,area:'vocabulário natural',skill:'vocabulary',level:'B1',text:'In conversation, “That makes sense” means:',opts:['Isso faz sentido.','Isso está caro.','Isso é obrigatório.','Isso está quebrado.'],ans:0,exp:'Chunk comum para mostrar compreensão.',grammar:'Fixed expression',structure:'That + makes + sense.',natural:'Use: “Oh, that makes sense.”'},
  {id:19,area:'estrutura',skill:'grammar',level:'B1',text:'Choose the best opinion with reason.',opts:['I think English important because travel.','I think English is important because I want to travel.','In my think, English important for travel.','I am think English is important to travel.'],ans:1,exp:'Use frase completa depois de I think e because.',grammar:'Opinion + reason',structure:'I think + clause + because + clause.',natural:'“In my opinion, English is important...”'},
  {id:20,area:'filmes/listening',skill:'listening',level:'B1',text:'“I’m gonna leave” is the informal spoken form of:',opts:['I am going to leave.','I have gone to leave.','I am leaving yesterday.','I will left.'],ans:0,exp:'Gonna = going to na fala informal.',grammar:'Spoken reduction',structure:'am going to + verb → gonna + verb.',natural:'Em prova formal, escreva “going to”.'},
  {id:21,area:'tempos verbais',skill:'grammar',level:'B1',text:'If it rains tomorrow, I ___ at home.',opts:['stay','stayed','will stay','was staying'],ans:2,exp:'First conditional: If + present, will + verb.',grammar:'First Conditional',structure:'If + present simple, subject + will + base verb.',natural:'“If I have time, I’ll practice speaking.”'},
  {id:22,area:'verbos',skill:'grammar',level:'B1',text:'Complete: She ___ already ___ dinner.',opts:['has / eaten','have / ate','did / eaten','was / eat'],ans:0,exp:'Already combina com Present Perfect.',grammar:'Present Perfect',structure:'has/have + already + past participle.',natural:'“She’s already eaten.”'},
  {id:23,area:'conversação',skill:'conversation',level:'B1',text:'Your friend says: “I’m nervous about my interview.” Best supportive answer:',opts:['You should practice your answers. You can do it.','You must nervous.','Interview is bad always.','You should to practice.'],ans:0,exp:'Should + verbo base; resposta encorajadora.',grammar:'Advice with should',structure:'should + base verb.',natural:'“You’ve got this!” é informal e positivo.'},
  {id:24,area:'escrita',skill:'writing',level:'B1',text:'Choose the clearest sentence for an email.',opts:['I write for ask information.','I am writing to ask for more information.','I writing because information.','I write you information ask.'],ans:1,exp:'Em email, “I am writing to...” é claro e profissional.',grammar:'Email opening',structure:'I am writing to + verb.',natural:'“I’m writing to ask about...”'},
  {id:25,area:'vocabulário natural',skill:'vocabulary',level:'B1+',text:'“I figured it out” means:',opts:['Eu descobri/entendi.','Eu desenhei isso.','Eu esqueci isso.','Eu comprei isso.'],ans:0,exp:'Figure out = entender ou resolver após pensar.',grammar:'Phrasal verb',structure:'figure out + object.',natural:'“I finally figured it out.”'},
  {id:26,area:'filmes/listening',skill:'listening',level:'B1+',text:'“Gotta” often means:',opts:['have got to / have to','go to always','get a','good at'],ans:0,exp:'Gotta pode indicar necessidade/obrigação.',grammar:'Spoken reduction',structure:'have got to + verb → gotta + verb.',natural:'“I gotta go.” = preciso ir.'},
  {id:27,area:'estrutura',skill:'grammar',level:'B1+',text:'Best contrast sentence:',opts:['I wanted to go out; however, I was too tired.','I wanted go out however I too tired.','I wanted to go out because I was too tired.','I wanted going out, however I tired.'],ans:0,exp:'However cria contraste e pede frase completa.',grammar:'Connectors',structure:'sentence; however, sentence.',natural:'Na fala, “but” é mais comum; em escrita, “however”.'},
  {id:28,area:'complexo',skill:'grammar',level:'B2',text:'Best meaning of “I wish I had studied earlier.”',opts:['Eu queria ter estudado antes.','Eu quero estudar agora.','Eu vou estudar mais cedo.','Eu estudo cedo sempre.'],ans:0,exp:'Wish + past perfect expressa arrependimento no passado.',grammar:'Wish + past perfect',structure:'I wish + subject + had + past participle.',natural:'“I wish I had practiced more.”'},
  {id:29,area:'complexo',skill:'grammar',level:'B2',text:'Choose the passive voice:',opts:['People speak English here.','English is spoken here.','English speaks here.','Here is speaking English.'],ans:1,exp:'Passiva: be + past participle.',grammar:'Passive voice',structure:'subject + is/are + past participle.',natural:'Usado em textos formais e placas.'},
  {id:30,area:'escrita',skill:'writing',level:'B2',text:'Choose the best academic connector.',opts:['I was tired, anyways I worked.','Although I was tired, I kept working.','I was tired, because I kept working.','I tired but work.'],ans:1,exp:'Although introduz contraste com estrutura clara.',grammar:'Subordinating conjunctions',structure:'Although + clause, main clause.',natural:'Em escrita B2, use “although”, “however”, “therefore”.'},
  {id:31,area:'vocabulário natural',skill:'vocabulary',level:'B2',text:'“That’s fair” usually means:',opts:['That is beautiful.','I understand your point.','That is cheap.','That is illegal.'],ans:1,exp:'É uma forma natural de reconhecer o argumento do outro.',grammar:'Conversational chunk',structure:'That + is + adjective.',natural:'“That’s fair, but I still disagree.”'},
  {id:32,area:'conversação',skill:'speaking',level:'B2',text:'Best response in a disagreement:',opts:['You are wrong and I am correct.','I see your point, but I have a different perspective.','No, bad idea.','I disagree because yes.'],ans:1,exp:'B2 exige discordar com diplomacia e motivo.',grammar:'Polite disagreement',structure:'I see your point, but + clause.',natural:'“I see where you’re coming from...”'},
  {id:33,area:'complexo',skill:'grammar',level:'B2+',text:'Choose the sentence with better nuance.',opts:['This solution is good always.','This solution tends to work well in most cases.','This solution work very good.','This solution is the best forever.'],ans:1,exp:'Tends to suaviza a generalização e soa mais preciso.',grammar:'Hedging',structure:'subject + tends to + verb.',natural:'B2/C1 usa hedging: might, tends to, seems to.'},
  {id:34,area:'escrita',skill:'writing',level:'B2+',text:'Best sentence for a formal email:',opts:['Hey, send me this fast.','Could you please send me the document when you have a chance?','Give me the doc.','I want document now.'],ans:1,exp:'Could you please... é educado e profissional.',grammar:'Formal requests',structure:'Could you please + base verb...?',natural:'“when you have a chance” suaviza o pedido.'},
  {id:35,area:'certificação',skill:'exam',level:'B2',text:'In IELTS/TOEFL-style speaking, what is best?',opts:['Answer with one word only.','Give an answer, a reason, and a short example.','Speak in Portuguese first.','Memorize one answer for all topics.'],ans:1,exp:'Respostas fortes têm ideia, motivo e exemplo.',grammar:'Speaking organisation',structure:'Answer + because + example.',natural:'Use: “I think..., because..., for example...”'},
  {id:36,area:'complexo',skill:'vocabulary',level:'C1',text:'Which word best completes: “The evidence is ___, but not conclusive.”',opts:['compelling','hungry','sleeping','cheap'],ans:0,exp:'Compelling = convincente/forte.',grammar:'Advanced adjective',structure:'evidence + be + adjective.',natural:'C1 usa adjetivos precisos: compelling, subtle, robust.'},
  {id:37,area:'complexo',skill:'writing',level:'C1',text:'Choose the most cohesive sentence.',opts:['The policy is costly. It is useful. People argue.','Although the policy is costly, it may be justified if the long-term benefits outweigh the initial investment.','Policy costly but good thing maybe.','Because policy is cost, benefit yes.'],ans:1,exp:'A frase usa contraste, condição e vocabulário preciso.',grammar:'Complex sentence',structure:'Although + clause, main clause + if + clause.',natural:'Boa estrutura para writing C1.'},
  {id:38,area:'conversação',skill:'speaking',level:'C1',text:'Best phrase to add nuance:',opts:['It is good.','To some extent, I agree, but there are important exceptions.','Yes good, no bad.','I agree 100% always.'],ans:1,exp:'C1 requer nuance, cautela e precisão.',grammar:'Discourse markers',structure:'To some extent, + clause, but + clause.',natural:'Também: “Broadly speaking...”, “That said...”'},
  {id:39,area:'certificação',skill:'exam',level:'C1',text:'In an academic essay, “nevertheless” is closest to:',opts:['therefore','however','for example','because'],ans:1,exp:'Nevertheless indica contraste, como however.',grammar:'Academic connectors',structure:'sentence. Nevertheless, sentence.',natural:'Use com cuidado em textos formais.'},
  {id:40,area:'vocabulário natural',skill:'vocabulary',level:'A2',text:'“I’m down” means:',opts:['I am sad.','I agree / I want to do it.','I am downstairs.','I am finished forever.'],ans:1,exp:'Expressão informal para aceitar convite.',grammar:'Informal expression',structure:'be down + for/to do something.',natural:'“Do you want to practice?” “I’m down.”'},
  {id:41,area:'vocabulário natural',skill:'vocabulary',level:'B1',text:'“Low-key nervous” means:',opts:['a little nervous / secretly nervous','not nervous at all','very angry','physically low'],ans:0,exp:'Low-key suaviza a ideia: um pouco, sem fazer alarde.',grammar:'Informal adverb',structure:'low-key + adjective.',natural:'“I’m low-key excited.”'},
  {id:42,area:'vocabulário natural',skill:'vocabulary',level:'B1',text:'“For real?” in a conversation means:',opts:['Really?','Forever?','For money?','Formal?'],ans:0,exp:'For real? pede confirmação ou mostra surpresa.',grammar:'Conversational phrase',structure:'For real?',natural:'Também aparece como “fr” em mensagens.'},
  {id:43,area:'verbos',skill:'grammar',level:'B1',text:'After “should”, use:',opts:['to + verb','base verb','verb + ing always','past participle always'],ans:1,exp:'Modais como should, can, must usam verbo base.',grammar:'Modal verbs',structure:'should + base verb.',natural:'“You should practice daily.”'},
  {id:44,area:'tempos verbais',skill:'grammar',level:'B2',text:'Choose the correct third conditional.',opts:['If I knew, I will help.','If I had known, I would have helped.','If I know, I would helped.','If I had knew, I helped.'],ans:1,exp:'Third conditional: If + past perfect, would have + participle.',grammar:'Third conditional',structure:'If + had + participle, would have + participle.',natural:'Usado para situações imaginárias no passado.'},
  {id:45,area:'estrutura',skill:'grammar',level:'A1',text:'Choose the correct plural.',opts:['one movie, two movies','one movies, two movie','one movie, two movie','one movie, two moviees'],ans:0,exp:'A maioria dos substantivos ganha -s no plural.',grammar:'Plural nouns',structure:'number + plural noun.',natural:'“I like horror movies.”'},
  {id:46,area:'certificação',skill:'reading',level:'B1',text:'Reading strategy: What should you do first?',opts:['Translate every word before reading.','Skim the text for general meaning.','Ignore the title.','Read only the last sentence.'],ans:1,exp:'Skimming ajuda a captar a ideia geral antes dos detalhes.',grammar:'Reading skills',structure:'Skim → scan → answer.',natural:'Útil em IELTS/TOEFL reading.'},
  {id:47,area:'certificação',skill:'listening',level:'B1',text:'Listening strategy: before audio starts, you should:',opts:['Read the questions and predict keywords.','Close your eyes and wait.','Write a full essay.','Translate all options aloud.'],ans:0,exp:'Prever palavras-chave melhora foco durante o áudio.',grammar:'Listening strategy',structure:'preview → predict → listen.',natural:'Treino essencial para provas.'},
  {id:48,area:'escrita',skill:'writing',level:'C1',text:'Best thesis statement:',opts:['I will talk about technology.','Technology has reshaped education by increasing access, but it also raises serious concerns about attention and inequality.','Technology good and bad.','This essay is technology.'],ans:1,exp:'A tese apresenta posição clara e dois pontos principais.',grammar:'Thesis statement',structure:'topic + claim + contrast.',natural:'Boa abertura para ensaio acadêmico.'}
 ],
