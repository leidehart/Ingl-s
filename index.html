<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LevelUp English — Treinos e Provas</title>
  <style>
    :root{
      --bg:#0f1224;--panel:#171b33;--panel2:#20264a;--text:#f7f7ff;--muted:#b9bdd7;
      --accent:#ffb84d;--accent2:#7ee7d7;--good:#86f59f;--bad:#ff8a8a;--warn:#ffd479;
      --line:rgba(255,255,255,.12);--shadow:0 20px 50px rgba(0,0,0,.35);--radius:22px
    }
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(126,231,215,.18),transparent 32%),radial-gradient(circle at top right,rgba(255,184,77,.16),transparent 28%),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
    header{padding:22px 18px 8px;position:sticky;top:0;background:linear-gradient(to bottom,rgba(15,18,36,.98),rgba(15,18,36,.87));backdrop-filter:blur(12px);z-index:20;border-bottom:1px solid var(--line)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;max-width:1180px;margin:0 auto}.brand{display:flex;align-items:center;gap:12px}.logo{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),#ff6ba6);color:#151515;font-weight:950;box-shadow:var(--shadow)}
    h1{font-size:clamp(22px,5vw,34px);margin:0;letter-spacing:-.04em}.subtitle{margin:3px 0 0;color:var(--muted);font-size:14px}.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:8px 11px;color:var(--muted);font-size:13px;white-space:nowrap}.pill strong{color:var(--text)}
    nav{max-width:1180px;margin:16px auto 0;display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}nav button{border:1px solid var(--line);color:var(--text);background:rgba(255,255,255,.05);border-radius:999px;padding:11px 14px;cursor:pointer;white-space:nowrap;font-weight:800}nav button.active{background:var(--accent);color:#151515;border-color:transparent}
    main{max-width:1180px;margin:0 auto;padding:20px 16px 80px}.tab{display:none}.tab.active{display:block;animation:fade .18s ease}@keyframes fade{from{opacity:.2;transform:translateY(8px)}to{opacity:1;transform:none}}
    .grid{display:grid;gap:16px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}@media(max-width:900px){.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}.topbar{align-items:flex-start}.hide-mobile{display:none}}
    .card{background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.035));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.card h2,.card h3{margin:0 0 10px;letter-spacing:-.025em}.muted{color:var(--muted)}.small{font-size:13px}.big{font-size:clamp(30px,8vw,56px);font-weight:950;letter-spacing:-.06em;margin:8px 0}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.divider{height:1px;background:var(--line);margin:18px 0}
    .progress{height:13px;background:rgba(255,255,255,.09);border-radius:999px;overflow:hidden;border:1px solid var(--line)}.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:999px;transition:width .35s ease}
    .btn{border:0;background:var(--accent);color:#161616;border-radius:14px;padding:12px 14px;font-weight:950;cursor:pointer;box-shadow:0 10px 24px rgba(255,184,77,.18)}.btn.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line);box-shadow:none}.btn.good{background:var(--accent2)}.btn.danger{background:var(--bad)}.btn:disabled{opacity:.45;cursor:not-allowed}.btn.block{width:100%;text-align:center}
    .input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.18);color:var(--text);border-radius:14px;padding:12px;font:inherit}textarea{min-height:110px;resize:vertical}
    .level-row{display:grid;grid-template-columns:78px 1fr auto;gap:12px;align-items:center;padding:12px;border-radius:18px;background:rgba(255,255,255,.045);border:1px solid var(--line);margin:9px 0}.badge{background:var(--panel2);border:1px solid var(--line);padding:8px 10px;border-radius:12px;font-weight:950;text-align:center}.level-row.unlocked .badge{background:rgba(126,231,215,.17);color:var(--accent2)}.level-row.current{outline:2px solid var(--accent)}
    .kpi{padding:14px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.04)}.kpi strong{font-size:28px;display:block;letter-spacing:-.04em}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;background:rgba(126,231,215,.12);color:var(--accent2);border:1px solid rgba(126,231,215,.25);font-size:12px;font-weight:850;margin:3px}.tag.warn{background:rgba(255,184,77,.12);color:var(--accent);border-color:rgba(255,184,77,.25)}.tag.bad{background:rgba(255,138,138,.12);color:var(--bad);border-color:rgba(255,138,138,.25)}
    .training-card{position:relative;overflow:hidden;cursor:pointer;transition:.16s transform,.16s background}.training-card:hover{transform:translateY(-2px);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04))}.training-card .emoji{font-size:34px}.training-card .meta{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-top:12px}
    .exam-shell{border:1px solid var(--line);border-radius:24px;background:rgba(0,0,0,.13);padding:16px}.question-title{font-size:clamp(20px,5vw,28px);font-weight:950;letter-spacing:-.03em;margin:8px 0 14px}.option{display:block;margin:10px 0;padding:13px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.05);cursor:pointer;transition:.12s}.option:hover{background:rgba(255,255,255,.09)}.option.selected{outline:2px solid var(--accent);background:rgba(255,184,77,.14)}.option.correct{outline:2px solid var(--good);background:rgba(134,245,159,.12)}.option.wrong{outline:2px solid var(--bad);background:rgba(255,138,138,.12)}.feedback{margin-top:12px;padding:13px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.055)}.correct-text{color:var(--good);font-weight:950}.wrong-text{color:var(--bad);font-weight:950}.explain-title{font-weight:950;color:var(--accent2);margin-top:8px}
    .table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:16px}.table th,.table td{border-bottom:1px solid var(--line);padding:11px;text-align:left}.table th{color:var(--accent2);font-size:13px}.table tr:last-child td{border-bottom:0}
    .chat{height:360px;overflow-y:auto;border:1px solid var(--line);border-radius:20px;padding:12px;background:rgba(0,0,0,.13)}.msg{max-width:88%;margin:10px 0;padding:11px 12px;border-radius:18px;line-height:1.42}.bot{background:rgba(126,231,215,.14);border:1px solid rgba(126,231,215,.25)}.user{background:rgba(255,184,77,.16);border:1px solid rgba(255,184,77,.25);margin-left:auto}.footer-note{color:var(--muted);font-size:12px;margin-top:14px}code{background:rgba(0,0,0,.28);padding:2px 5px;border-radius:6px}.quote{border-left:4px solid var(--accent);padding:10px 14px;background:rgba(255,184,77,.08);border-radius:12px}.hidden{display:none!important}
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="brand">
        <div class="logo">EN</div>
        <div>
          <h1>LevelUp English</h1>
          <p class="subtitle">Treinos clicáveis em modo prova • A2 → B1/B2 • voz, fala e revisão quinzenal.</p>
        </div>
      </div>
      <div class="pill hide-mobile" id="todayPill">Carregando...</div>
    </div>
    <nav id="nav"></nav>
  </header>
  <main>
    <section class="tab active" id="dashboard"></section>
    <section class="tab" id="levels"></section>
    <section class="tab" id="plan"></section>
    <section class="tab" id="training"></section>
    <section class="tab" id="verbs"></section>
    <section class="tab" id="tenses"></section>
    <section class="tab" id="listening"></section>
    <section class="tab" id="speaking"></section>
    <section class="tab" id="conversation"></section>
    <section class="tab" id="review"></section>
    <section class="tab" id="settings"></section>
  </main>
<script>
const APP={
 state:JSON.parse(localStorage.getItem('levelupEnglishV2')||'{}'),
 tabs:[['dashboard','Início'],['levels','Levels'],['plan','Plano'],['training','Treinos/Provas'],['verbs','Verbos'],['tenses','Tempos'],['listening','Ouvir'],['speaking','Falar'],['conversation','Conversar'],['review','Avaliação'],['settings','Ajustes']],
 levels:[
  {id:'A2.0',min:0,title:'Base A2',desc:'Rotina, frases simples, perguntas básicas e sobrevivência em viagem.'},
  {id:'A2.1',min:220,title:'Passado e futuro',desc:'Contar o que aconteceu e falar de planos com naturalidade.'},
  {id:'A2.2',min:520,title:'Frases conectadas',desc:'Usar because, so, but, when, before, after sem travar.'},
  {id:'A2+',min:900,title:'Pré-B1',desc:'Mais vocabulário natural, perguntas melhores e escuta guiada.'},
  {id:'B1.1',min:1400,title:'Intermediário real',desc:'Explicar opinião, rotina, experiências, problemas e soluções.'},
  {id:'B1.2',min:2000,title:'B1 forte',desc:'Entender vídeos claros, conversas simples e cenas familiares.'},
  {id:'B1+',min:2700,title:'Ponte para B2',desc:'Fala mais rápida, chunks, phrasal verbs comuns e filmes com legenda em inglês.'},
  {id:'B2.0',min:3600,title:'Filmes em inglês padrão',desc:'Entender grande parte de conteúdos claros, com menos dependência de legenda.'}
 ],
 syllabus:[
  {week:1,level:'A2.0',theme:'Rotina + Simple Present',goal:'falar o que você faz todo dia',grammar:'I work, I study, she works, do/does',vocab:'routine, usually, every day, after work, field, gym'},
  {week:2,level:'A2.1',theme:'Ontem + Simple Past',goal:'contar o que aconteceu',grammar:'worked, went, slept, watched, was/were',vocab:'yesterday, last night, tired, busy, a lot'},
  {week:3,level:'A2.1',theme:'Planos + Going to',goal:'falar de amanhã e viagens',grammar:'I am going to travel / work / study',vocab:'next week, tomorrow, plan, trip, improve'},
  {week:4,level:'A2.2',theme:'Perguntas e negativas',goal:'perguntar e responder melhor',grammar:'Do you...? Did you...? Are you going to...?',vocab:'repeat, mean, help, understand'},
  {week:5,level:'A2+',theme:'Conectores',goal:'criar frases maiores',grammar:'because, so, but, when, before, after',vocab:'although, reason, example, problem'},
  {week:6,level:'A2+',theme:'Comparativos e preferências',goal:'comparar filmes, lugares e hábitos',grammar:'better, easier, more interesting, the best',vocab:'horror, romance, plot, character, scary'},
  {week:7,level:'B1.1',theme:'Present Perfect',goal:'falar de experiências',grammar:'I have never been / I have studied since...',vocab:'already, yet, ever, never, since, for'},
  {week:8,level:'B1.1',theme:'Past Continuous',goal:'contar cenas e interrupções',grammar:'I was watching when...',vocab:'suddenly, outside, during, while'},
  {week:9,level:'B1.2',theme:'Condicionais',goal:'falar de possibilidades',grammar:'If it rains, I will stay home',vocab:'if, unless, maybe, probably'},
  {week:10,level:'B1.2',theme:'Modais',goal:'pedir, aconselhar e obrigação',grammar:'can, could, should, must, have to',vocab:'advice, allowed, possible, necessary'},
  {week:11,level:'B1+',theme:'Inglês natural de filmes',goal:'entender chunks e reduções',grammar:'gonna, wanna, gotta, used to',vocab:'Are you kidding me?, No way, That makes sense'},
  {week:12,level:'B1+',theme:'Revisão + prova grande',goal:'consolidar tudo e medir evolução',grammar:'mistura de tempos e estruturas',vocab:'travel, work, movies, opinions, problems'}
 ],
 trainings:[
  {id:'placement',emoji:'🎯',title:'Prova de nível A2→B1',desc:'Mistura de tempos, estrutura e vocabulário natural.',area:'geral',level:'A2-B1',count:20,xp:70},
  {id:'verbs-basic',emoji:'🏋️',title:'Prova só de verbos',desc:'Verbos comuns, irregulares, auxiliares e modais.',area:'verbos',level:'A2-B1',count:18,xp:65},
  {id:'tenses',emoji:'⏰',title:'Prova de tempos verbais',desc:'Presente, passado, futuro, perfect, continuous e conditionals.',area:'tempos verbais',level:'A2-B1+',count:20,xp:75},
  {id:'sentence-structure',emoji:'🧱',title:'Prova de estrutura da frase',desc:'Ordem das palavras, perguntas, negativas e conectores.',area:'estrutura',level:'A2-B1',count:18,xp:65},
  {id:'natural-vocab',emoji:'💬',title:'Prova de vocabulário natural',desc:'Chunks, collocations e frases que nativos usam.',area:'vocabulário natural',level:'A2-B1+',count:18,xp:65},
  {id:'movies',emoji:'🎬',title:'Prova inglês de filmes',desc:'Gonna, wanna, tom de conversa, frases rápidas e contexto.',area:'filmes/listening',level:'B1-B2',count:16,xp:70},
  {id:'mixed-hard',emoji:'🔥',title:'Prova complexa geral',desc:'Perguntas mais difíceis com explicações completas.',area:'complexo',level:'B1-B2',count:24,xp:95},
  {id:'biweekly',emoji:'📅',title:'Avaliação quinzenal',desc:'Relembra tudo que você treinou até agora.',area:'avaliação',level:'adaptativa',count:24,xp:100}
 ],
 questions:[
  {id:1,area:'tempos verbais',level:'A2',text:'Choose the best sentence for “Ontem eu dormi muito porque estava cansada.”',opts:['Yesterday I sleep a lot because I am tired.','Yesterday I slept a lot because I was tired.','Yesterday I was sleep a lot because I tired.','Yesterday I sleeping so much because I was tired.'],ans:1,exp:'Use Simple Past com yesterday: slept. Para estado no passado, use was/were: I was tired.',grammar:'Simple Past',structure:'Yesterday + sujeito + verbo no passado + because + sujeito + was/were + adjetivo.',natural:'“I slept a lot” é natural. Evite traduzir “dormi muito” como “slept very much”.'},
  {id:2,area:'vocabulário natural',level:'A2',text:'What is the most natural way to say “quero melhorar minha fala”?',opts:['I want to grow my speak.','I want to improve my speaking.','I want to increase my speak.','I want to make bigger my speech.'],ans:1,exp:'Em inglês natural, dizemos improve my speaking. Speak é verbo; speaking pode ser habilidade/atividade.',grammar:'Verb + object',structure:'I want to + verb + object.',natural:'Use “improve my speaking”, “practice speaking”, “work on my pronunciation”.'},
  {id:3,area:'estrutura',level:'A2',text:'Choose the correct question.',opts:['Where you live?','Where do you live?','Where does you live?','Where are you live?'],ans:1,exp:'Pergunta no Simple Present com you precisa de do.',grammar:'Questions with do/does',structure:'Where + do + you + base verb?',natural:'Em conversa: “Where do you live?” ou “Where are you from?”'},
  {id:4,area:'tempos verbais',level:'A2',text:'Tomorrow, I ___ work and then to the gym.',opts:['go','went','am going to','was going'],ans:2,exp:'Tomorrow indica futuro. Use be going to para plano.',grammar:'Future with going to',structure:'Sujeito + am/is/are going to + verbo base.',natural:'Também é natural: “Tomorrow, I’m working and then going to the gym.”'},
  {id:5,area:'vocabulário natural',level:'A2',text:'Which sentence sounds most natural?',opts:['I study English for a travel.','I study English for traveling.','I study English to a travel.','I study English for make travel.'],ans:1,exp:'Travel como ideia geral não usa “a” aqui.',grammar:'Prepositions',structure:'study English + for + noun/gerund.',natural:'Mais natural ainda: “I study English because I want to travel.”'},
  {id:6,area:'estrutura',level:'A2',text:'Complete: I like horror and romance ___.',opts:['movie','movies','watch','seeing'],ans:1,exp:'Quando fala de categoria geral, use plural.',grammar:'Plural nouns',structure:'I like + categoria plural.',natural:'“I like horror movies and romance movies.”'},
  {id:7,area:'tempos verbais',level:'A2+',text:'I have lived here ___ 2020.',opts:['for','since','during','ago'],ans:1,exp:'Since marca o ponto de início.',grammar:'Present Perfect with since/for',structure:'have/has + past participle + since + ano.',natural:'Use “for” para duração: for three years.'},
  {id:8,area:'tempos verbais',level:'B1',text:'Choose the best sentence.',opts:['I was watching a movie when my friend called.','I watched a movie when my friend was call.','I am watching a movie when my friend called yesterday.','I was watch a movie when my friend called.'],ans:0,exp:'Past continuous mostra ação em andamento; simple past interrompe.',grammar:'Past Continuous + Simple Past',structure:'was/were + verb-ing + when + simple past.',natural:'Muito comum para narrar cenas de filmes.'},
  {id:9,area:'vocabulário natural',level:'B1',text:'In a conversation, “That makes sense” means:',opts:['Isso faz sentido.','Isso está caro.','Isso é obrigatório.','Isso está quebrado.'],ans:0,exp:'Chunk comum em filmes e conversas.',grammar:'Fixed expression',structure:'That + verb + noun.',natural:'Use para mostrar que você entendeu uma explicação.'},
  {id:10,area:'estrutura',level:'B1',text:'Choose the best way to give an opinion with reason.',opts:['I think English important because travel.','I think English is important because I want to travel.','In my think, English important for travel.','I am think English is important to travel.'],ans:1,exp:'Estrutura clara: I think + frase completa + because + motivo.',grammar:'Opinion + reason',structure:'I think + subject + verb + adjective + because + subject + verb.',natural:'Também: “In my opinion, English is important...”'},
  {id:11,area:'filmes/listening',level:'B1',text:'“I’m gonna leave” is the informal spoken form of:',opts:['I am going to leave.','I have gone to leave.','I am leaving yesterday.','I will left.'],ans:0,exp:'Gonna = going to na fala informal.',grammar:'Spoken reduction',structure:'am going to + verb → gonna + verb.',natural:'Em fala informal: “I’m gonna go.” Em prova formal: “I’m going to go.”'},
  {id:12,area:'tempos verbais',level:'B1',text:'If it rains tomorrow, I ___ at home.',opts:['stay','stayed','will stay','was staying'],ans:2,exp:'First conditional: If + present simple, will + verb.',grammar:'First Conditional',structure:'If + present simple, subject + will + base verb.',natural:'Use para possibilidade real no futuro.'},
  {id:13,area:'estrutura',level:'A2+',text:'Which sentence connects ideas best?',opts:['I was tired. I slept a lot.','I slept a lot because I was tired.','Because tired I slept much.','I slept because I tired.'],ans:1,exp:'Because conecta causa. Precisa de sujeito + verbo.',grammar:'Connectors',structure:'Main sentence + because + reason.',natural:'Frase curta e natural: “I slept a lot because I was exhausted.”'},
  {id:14,area:'vocabulário natural',level:'B1',text:'What does “Could you repeat that?” mean?',opts:['Você pode repetir isso?','Você pode apagar isso?','Você pode comprar isso?','Você pode traduzir isso?'],ans:0,exp:'Could you...? é uma forma educada de pedir.',grammar:'Modal could',structure:'Could you + base verb + object?',natural:'Essencial em viagem: “Could you speak more slowly?”'},
  {id:15,area:'tempos verbais',level:'B1',text:'I ___ never ___ to London.',opts:['have / been','has / gone','did / been','was / go'],ans:0,exp:'Present Perfect para experiência.',grammar:'Present Perfect',structure:'I have never + past participle.',natural:'“I’ve never been to London.” é muito comum.'},
  {id:16,area:'estrutura',level:'B1',text:'Which version is more natural?',opts:['Although I was tired, I kept studying.','Although I tired, I kept study.','Although I was tired, I keep studied.','Although tired was I, I studied kept.'],ans:0,exp:'Although = embora. Kept + verbo com -ing.',grammar:'Concession + gerund',structure:'Although + sentence, subject + kept + verb-ing.',natural:'Mais natural: “Even though I was tired, I kept studying.”'},
  {id:17,area:'vocabulário natural',level:'A2+',text:'“I’m looking for the station” means:',opts:['Estou procurando a estação.','Estou olhando a estação.','Estou esperando a estação.','Estou saindo da estação.'],ans:0,exp:'Look for = procurar.',grammar:'Phrasal verb',structure:'look for + object.',natural:'Não traduza palavra por palavra: look ≠ sempre olhar.'},
  {id:18,area:'tempos verbais',level:'A2+',text:'She usually ___ coffee, but yesterday she ___ tea.',opts:['drinks / drank','drink / drank','drank / drinks','drinks / drinked'],ans:0,exp:'Usually pede presente; yesterday pede passado.',grammar:'Present vs past',structure:'usually + present; yesterday + past.',natural:'Drank é passado irregular de drink.'},
  {id:19,area:'estrutura',level:'B1+',text:'Choose the sentence with the best flow.',opts:['I want travel but I no speak English good.','I want to travel, but I don’t speak English very well yet.','I want traveling but I am not speak English good.','I want travel, however I don’t speaking good.'],ans:1,exp:'Want + to verb. Negative: don’t + base verb. Very well descreve speak.',grammar:'Verb patterns + adverbs',structure:'I want to + verb, but I don’t + verb + very well yet.',natural:'“yet” deixa claro que você está evoluindo.'},
  {id:20,area:'filmes/listening',level:'B1+',text:'In movies, “Are you kidding me?” usually means:',opts:['Você está brincando comigo? / Sério isso?','Você está me ensinando?','Você está me procurando?','Você está atrasado?'],ans:0,exp:'Chunk comum para surpresa, irritação ou incredulidade.',grammar:'Fixed expression',structure:'Are + subject + verb-ing?',natural:'O tom da voz muda o sentido: surpresa, raiva ou humor.'},
  {id:21,area:'verbos',level:'A2',text:'Past of “go”:',opts:['goed','went','gone','goes'],ans:1,exp:'Go é irregular: go → went → gone.',grammar:'Irregular verbs',structure:'Yesterday, I went...',natural:'“I went to the gym yesterday.”'},
  {id:22,area:'verbos',level:'A2',text:'Complete: She ___ English every day.',opts:['study','studies','studying','studied'],ans:1,exp:'No Simple Present com he/she/it, o verbo ganha -s/-es.',grammar:'3rd person -s',structure:'She + verb-s + object.',natural:'“She studies English every day.”'},
  {id:23,area:'verbos',level:'A2',text:'Choose the correct negative:',opts:['I no like coffee.','I don’t like coffee.','I not like coffee.','I doesn’t like coffee.'],ans:1,exp:'Com I/you/we/they, use don’t + verbo base.',grammar:'Negatives',structure:'I + don’t + base verb.',natural:'“I don’t really like coffee.” soa natural.'},
  {id:24,area:'verbos',level:'A2+',text:'Past participle of “see”:',opts:['saw','seen','seed','seeing'],ans:1,exp:'See → saw → seen. O particípio aparece em Present Perfect.',grammar:'Past participle',structure:'I have seen...',natural:'“I’ve seen that movie.”'},
  {id:25,area:'verbos',level:'A2+',text:'Complete: You ___ study a little every day.',opts:['should','went','are','did'],ans:0,exp:'Should dá conselho.',grammar:'Modal verb',structure:'should + verbo base.',natural:'“You should practice speaking too.”'},
  {id:26,area:'verbos',level:'B1',text:'Choose the sentence with correct modal use:',opts:['She can speaks English.','She can speak English.','She cans speak English.','She can to speak English.'],ans:1,exp:'Depois de modal, use verbo base sem to e sem -s.',grammar:'Modals',structure:'can/should/must + base verb.',natural:'“She can speak English pretty well.”'},

let exam=null;
function initState(){if(!APP.state.started){APP.state={started:new Date().toISOString(),xp:0,streak:1,answered:0,correct:0,exams:[],weak:{},voiceURI:'',rate:.9,dayOffset:0,chat:[]};save();}}
function save(){localStorage.setItem('levelupEnglishV2',JSON.stringify(APP.state));}
function day(){return Math.max(1,Math.floor((new Date()-new Date(APP.state.started))/86400000)+1+(APP.state.dayOffset||0));}
function xp(){return APP.state.xp||0;}function level(){let cur=APP.levels[0];APP.levels.forEach(l=>{if(xp()>=l.min)cur=l});return cur;}function nextLevel(){return APP.levels.find(l=>l.min>xp())||APP.levels[APP.levels.length-1];}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function addXP(n,reason=''){APP.state.xp=xp()+n;save();renderAll();if(reason)toast(`+${n} XP — ${reason}`);}function toast(t){let el=document.createElement('div');el.textContent=t;el.style.cssText='position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#ffb84d;color:#111;padding:12px 16px;border-radius:999px;font-weight:950;box-shadow:0 15px 35px rgba(0,0,0,.35);z-index:99';document.body.appendChild(el);setTimeout(()=>el.remove(),1800);}
function setupNav(){document.getElementById('nav').innerHTML=APP.tabs.map(([id,label])=>`<button data-tab="${id}" class="${id==='dashboard'?'active':''}">${label}</button>`).join('');document.getElementById('nav').addEventListener('click',e=>{let b=e.target.closest('button[data-tab]');if(!b)return;showTab(b.dataset.tab);});}
function showTab(id){document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id===id));window.scrollTo({top:0,behavior:'smooth'});}
function progressPct(){let cur=level(),next=nextLevel();let span=Math.max(1,next.min-cur.min);return Math.min(100,Math.round(((xp()-cur.min)/span)*100));}
function renderDashboard(){let cur=level(),next=nextLevel(),pct=progressPct();document.getElementById('todayPill').innerHTML=`Dia <strong>${day()}</strong> • <strong>${cur.id}</strong> • ${xp()} XP`;let weak=Object.entries(APP.state.weak||{}).sort((a,b)=>b[1]-a[1]).slice(0,4);document.getElementById('dashboard').innerHTML=`
 <div class="grid two"><div class="card"><p class="tag warn">Seu nível atual: ${cur.id}</p><h2>Rota de hoje</h2><div class="big">${xp()} XP</div><p class="muted">Próximo level: <strong>${next.id}</strong> com ${next.min} XP.</p><div class="progress"><div class="bar" style="width:${pct}%"></div></div><p class="small muted">${pct}% do caminho entre ${cur.id} e ${next.id}.</p><div class="row"><button class="btn" onclick="showTab('training')">Fazer treino em modo prova</button><button class="btn secondary" onclick="startExam('biweekly')">Simular avaliação quinzenal</button></div></div>
 <div class="card"><h2>Meta realista de 3 meses</h2><p>Saindo do A2, o objetivo forte é chegar em <strong>B1/B1+</strong>: entender vídeos claros, cenas familiares e muita coisa com legenda em inglês. Filmes sem legenda total exigem mais tempo, mas o app acelera seu listening com chunks, fala rápida e revisão.</p><div class="quote">Regra diária: 20 min prova + 15 min ouvir + 15 min falar + 10 min revisar erros.</div></div></div>
 <div class="grid four" style="margin-top:16px"><div class="kpi"><span class="muted">Provas feitas</span><strong>${(APP.state.exams||[]).length}</strong></div><div class="kpi"><span class="muted">Questões respondidas</span><strong>${APP.state.answered||0}</strong></div><div class="kpi"><span class="muted">Acertos</span><strong>${APP.state.correct||0}</strong></div><div class="kpi"><span class="muted">Precisam revisão</span><strong>${weak.length?weak.map(w=>w[0]).join(', '):'—'}</strong></div></div>
 <div class="card" style="margin-top:16px"><h2>Treinos clicáveis principais</h2><div class="grid four">${APP.trainings.slice(0,4).map(t=>trainingCard(t)).join('')}</div></div>`;}
function trainingCard(t){return `<div class="card training-card" onclick="startExam('${t.id}')"><div class="emoji">${t.emoji}</div><h3>${t.title}</h3><p class="muted small">${t.desc}</p><div>${tag(t.level)} ${tag(t.area,'warn')}</div><div class="meta"><span class="small muted">${t.count} questões</span><strong>${t.xp} XP</strong></div></div>`;}
function tag(text,type=''){return `<span class="tag ${type}">${esc(text)}</span>`;}
function renderLevels(){let x=xp();document.getElementById('levels').innerHTML=`<div class="card"><h2>Levels destacados</h2><p class="muted">Você sobe de level acumulando XP nas provas, nos treinos de voz e nas revisões.</p>${APP.levels.map(l=>`<div class="level-row ${x>=l.min?'unlocked':''} ${level().id===l.id?'current':''}"><div class="badge">${l.id}</div><div><strong>${l.title}</strong><p class="muted small">${l.desc}</p></div><div class="small">${l.min} XP</div></div>`).join('')}</div>`;}
function renderPlan(){document.getElementById('plan').innerHTML=`<div class="card"><h2>Plano de 12 semanas</h2><p class="muted">Inspirado em rotina universitária: objetivo claro, prática ativa, feedback, revisão espaçada e prova periódica.</p><table class="table"><thead><tr><th>Semana</th><th>Level</th><th>Foco</th><th>Você precisa conseguir</th><th>Conteúdo</th></tr></thead><tbody>${APP.syllabus.map(s=>`<tr><td>${s.week}</td><td>${s.level}</td><td>${s.theme}</td><td>${s.goal}</td><td><strong>${s.grammar}</strong><br><span class="muted small">${s.vocab}</span></td></tr>`).join('')}</tbody></table></div>`;}
function renderTraining(){document.getElementById('training').innerHTML=`<div class="card"><h2>Treinos clicáveis em formato de prova</h2><p class="muted">Clique em um treino. Ele abre como prova: uma questão por vez, alternativas clicáveis, pontuação e explicação completa de tempo verbal, vocabulário natural e estrutura.</p><div class="grid four">${APP.trainings.map(t=>trainingCard(t)).join('')}</div></div><div id="examMount" style="margin-top:16px"></div>`;}
function filterQuestions(trainingId){let q=[...APP.questions];if(trainingId==='placement')return pick(q.filter(x=>['A2','A2+','B1'].includes(x.level)),20);if(trainingId==='verbs-basic')return pick(q.filter(x=>x.area==='verbos'),18);if(trainingId==='tenses')return pick(q.filter(x=>x.area==='tempos verbais'),20);if(trainingId==='sentence-structure')return pick(q.filter(x=>x.area==='estrutura'),18);if(trainingId==='natural-vocab')return pick(q.filter(x=>x.area==='vocabulário natural'),18);if(trainingId==='movies')return pick(q.filter(x=>x.area==='filmes/listening'||x.area==='vocabulário natural'),16);if(trainingId==='mixed-hard')return pick(q.filter(x=>['B1','B1+','B2'].includes(x.level)||x.area==='complexo'),24);if(trainingId==='biweekly'){let week=Math.ceil(day()/7);let allowed=APP.syllabus.slice(0,Math.max(2,Math.min(APP.syllabus.length,week*1))).map(s=>s.level);let base=q.filter(x=>allowed.includes(x.level)||x.level==='A2'||x.level==='A2+');return pick(base,24)}return pick(q,20);}
function pick(arr,n){let copy=[...arr].sort(()=>Math.random()-.5);while(copy.length<n&&copy.length<APP.questions.length){copy.push(...APP.questions.sort(()=>Math.random()-.5).slice(0,n-copy.length));}return copy.slice(0,n);}
function startExam(id){let t=APP.trainings.find(x=>x.id===id)||APP.trainings[0];exam={training:t,qs:filterQuestions(id),i:0,answers:[],checked:false,selected:null,score:0,start:Date.now()};showTab('training');setTimeout(()=>renderExam(),50);}
function renderExam(){let mount=document.getElementById('examMount');if(!mount){renderTraining();mount=document.getElementById('examMount')}let q=exam.qs[exam.i];let done=exam.i, total=exam.qs.length;mount.innerHTML=`<div class="exam-shell"><div class="row" style="justify-content:space-between"><div>${tag(exam.training.level)} ${tag(exam.training.area,'warn')}</div><div class="pill">Questão ${exam.i+1}/${total}</div></div><h2>${exam.training.emoji} ${exam.training.title}</h2><div class="progress"><div class="bar" style="width:${Math.round((done/total)*100)}%"></div></div><div class="question-title">${esc(q.text)}</div><div id="options">${q.opts.map((o,idx)=>`<div class="option ${exam.selected===idx?'selected':''}" onclick="selectOption(${idx})"><strong>${String.fromCharCode(65+idx)})</strong> ${esc(o)}</div>`).join('')}</div><div id="feedbackBox"></div><div class="row" style="margin-top:14px"><button class="btn" onclick="checkAnswer()" ${exam.selected===null||exam.checked?'disabled':''}>Responder</button><button class="btn good" onclick="nextQuestion()" ${!exam.checked?'disabled':''}>${exam.i===total-1?'Finalizar prova':'Próxima'}</button><button class="btn secondary" onclick="cancelExam()">Sair da prova</button></div></div>`;mount.scrollIntoView({behavior:'smooth',block:'start'});}
function selectOption(idx){if(exam.checked)return;exam.selected=idx;renderExam();}
function checkAnswer(){let q=exam.qs[exam.i];exam.checked=true;let ok=exam.selected===q.ans;if(ok)exam.score++;exam.answers.push({id:q.id,area:q.area,ok,selected:exam.selected});APP.state.answered=(APP.state.answered||0)+1;if(ok)APP.state.correct=(APP.state.correct||0)+1;else{APP.state.weak[q.area]=(APP.state.weak[q.area]||0)+1;}save();let opts=[...document.querySelectorAll('.option')];opts.forEach((el,idx)=>{if(idx===q.ans)el.classList.add('correct');if(idx===exam.selected&&idx!==q.ans)el.classList.add('wrong');});document.getElementById('feedbackBox').innerHTML=`<div class="feedback"><div class="${ok?'correct-text':'wrong-text'}">${ok?'Acertou!':'Errou, mas isso vira revisão.'}</div><p><strong>Resposta certa:</strong> ${String.fromCharCode(65+q.ans)}) ${esc(q.opts[q.ans])}</p><div class="explain-title">Explicação simples</div><p>${esc(q.exp)}</p><div class="explain-title">Tempo verbal / gramática</div><p><strong>${esc(q.grammar)}</strong></p><div class="explain-title">Estrutura da frase</div><p><code>${esc(q.structure)}</code></p><div class="explain-title">Vocabulário natural</div><p>${esc(q.natural)}</p></div>`;document.querySelector('.exam-shell .btn').disabled=true;document.querySelector('.exam-shell .btn.good').disabled=false;}
function nextQuestion(){if(exam.i>=exam.qs.length-1){finishExam();return;}exam.i++;exam.checked=false;exam.selected=null;renderExam();}
function finishExam(){let total=exam.qs.length,score=exam.score,pct=Math.round(score/total*100),xpGain=Math.round(exam.training.xp*(score/total));let areas={};exam.answers.forEach(a=>{areas[a.area]=areas[a.area]||{ok:0,total:0};areas[a.area].total++;if(a.ok)areas[a.area].ok++;});APP.state.exams.push({date:new Date().toISOString(),title:exam.training.title,score,total,pct,xp:xpGain});addXP(xpGain,'prova concluída');let rows=Object.entries(areas).map(([a,v])=>`<tr><td>${a}</td><td>${v.ok}/${v.total}</td><td>${Math.round(v.ok/v.total*100)}%</td></tr>`).join('');document.getElementById('examMount').innerHTML=`<div class="card"><h2>Resultado da prova</h2><div class="big">${pct}%</div><p>Você acertou <strong>${score}/${total}</strong> e ganhou <strong>${xpGain} XP</strong>.</p><table class="table"><thead><tr><th>Área</th><th>Acertos</th><th>%</th></tr></thead><tbody>${rows}</tbody></table><div class="row" style="margin-top:14px"><button class="btn" onclick="startExam('${exam.training.id}')">Refazer esta prova</button><button class="btn secondary" onclick="showTab('review')">Ver revisão</button></div></div>`;exam=null;renderAll(false);}
function cancelExam(){exam=null;document.getElementById('examMount').innerHTML='';}
function renderVerbs(){let verbs=[['be','was/were','been','ser/estar'],['go','went','gone','ir'],['do','did','done','fazer'],['make','made','made','fazer/criar'],['have','had','had','ter'],['get','got','got/gotten','obter/ficar'],['see','saw','seen','ver'],['take','took','taken','pegar/levar'],['speak','spoke','spoken','falar'],['write','wrote','written','escrever'],['eat','ate','eaten','comer'],['drink','drank','drunk','beber'],['sleep','slept','slept','dormir'],['watch','watched','watched','assistir'],['study','studied','studied','estudar']];document.getElementById('verbs').innerHTML=`<div class="grid two"><div class="card"><h2>Exercícios só de verbos</h2><p class="muted">Treine verbos como se fosse prova: passado, particípio, auxiliares, modais e phrasal verbs.</p><div class="row"><button class="btn" onclick="startExam('verbs-basic')">Iniciar prova de verbos</button><button class="btn secondary" onclick="verbFlash()">Flashcard rápido</button></div><div id="verbFlashBox" class="feedback hidden"></div></div><div class="card"><h2>Regras essenciais</h2><p>${tag('Do/does')} ${tag('Did + verbo base')} ${tag('Modal + verbo base')} ${tag('Have + particípio')}</p><ul><li><strong>She studies</strong>, mas <strong>Does she study?</strong></li><li><strong>I went</strong>, mas <strong>Did you go?</strong></li><li><strong>She can speak</strong>, nunca “can speaks”.</li><li><strong>I have seen</strong>, não “I have saw”.</li></ul></div></div><div class="card" style="margin-top:16px"><h2>Tabela de verbos para revisão</h2><table class="table"><thead><tr><th>Base</th><th>Past</th><th>Participle</th><th>Português</th></tr></thead><tbody>${verbs.map(v=>`<tr><td>${v[0]}</td><td>${v[1]}</td><td>${v[2]}</td><td>${v[3]}</td></tr>`).join('')}</tbody></table></div>`;window._verbs=verbs;}
function verbFlash(){let v=(window._verbs||[])[Math.floor(Math.random()*(window._verbs||[]).length)];let box=document.getElementById('verbFlashBox');box.classList.remove('hidden');box.innerHTML=`<strong>${v[0]}</strong> → past: <strong>${v[1]}</strong> → participle: <strong>${v[2]}</strong><br><span class="muted">Exemplo: I have ${v[2].split('/')[0]}...</span>`;addXP(2,'flashcard de verbo');}
function renderTenses(){let rows=[['Simple Present','rotina/fato','I study English every day.','do/does em perguntas'],['Present Continuous','agora/processo','I am studying now.','am/is/are + ing'],['Simple Past','passado acabado','I studied yesterday.','did em perguntas'],['Going to Future','plano/intenção','I am going to travel.','be going to + verbo'],['Present Perfect','experiência/conexão com presente','I have seen this movie.','have/has + particípio'],['Past Continuous','ação em andamento no passado','I was watching a movie.','was/were + ing'],['First Conditional','possibilidade real','If it rains, I will stay home.','if + present, will'],['Second Conditional','hipótese','If I had time, I would study.','if + past, would']];document.getElementById('tenses').innerHTML=`<div class="card"><h2>Exercícios de tempos verbais</h2><p class="muted">Aqui você treina tempo, quando usar, estrutura e exemplos naturais.</p><div class="row"><button class="btn" onclick="startExam('tenses')">Iniciar prova de tempos</button><button class="btn secondary" onclick="startExam('mixed-hard')">Prova complexa</button></div></div><div class="card" style="margin-top:16px"><h2>Mapa dos tempos</h2><table class="table"><thead><tr><th>Tempo</th><th>Quando usar</th><th>Exemplo</th><th>Estrutura</th></tr></thead><tbody>${rows.map(r=>`<tr><td><strong>${r[0]}</strong></td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('')}</tbody></table></div>`;}
function renderListening(){document.getElementById('listening').innerHTML=`<div class="card"><h2>Ouvir com voz feminina</h2><p class="muted">Escolha um áudio, toque para ouvir, responda à pergunta e ganhe XP. A voz depende das vozes disponíveis no seu celular/navegador.</p><div class="grid two">${APP.listeningItems.map((it,i)=>`<div class="card"><p>${tag(it.level)} ${tag(it.title,'warn')}</p><p class="muted small">${esc(it.text)}</p><button class="btn" onclick="speakText(${JSON.stringify(it.text).replace(/"/g,'&quot;')})">Ouvir</button><div style="margin-top:12px"><strong>${esc(it.ask)}</strong><input class="input" id="listenAns${i}" placeholder="Type your answer in English" style="margin-top:8px"><button class="btn secondary" style="margin-top:8px" onclick="checkListening(${i})">Corrigir</button><div id="listenFb${i}"></div></div></div>`).join('')}</div></div>`;}
function speakText(text){if(!('speechSynthesis'in window)){toast('Seu navegador não tem voz automática.');return;}let u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=APP.state.rate||.9;let voices=speechSynthesis.getVoices();let selected=voices.find(v=>v.voiceURI===APP.state.voiceURI)||voices.find(v=>/female|woman|samantha|zira|victoria|google us english/i.test(v.name))||voices.find(v=>/en-US|en_GB|English/i.test(v.lang||v.name));if(selected)u.voice=selected;speechSynthesis.cancel();speechSynthesis.speak(u);}
function checkListening(i){let it=APP.listeningItems[i],ans=(document.getElementById('listenAns'+i).value||'').toLowerCase();let hits=it.keywords.filter(k=>ans.includes(k.toLowerCase())).length;let ok=hits>0||ans.includes(it.answer.split(' ')[1]||'');document.getElementById('listenFb'+i).innerHTML=`<div class="feedback"><strong class="${ok?'correct-text':'wrong-text'}">${ok?'Boa!':'Quase.'}</strong><p>Resposta modelo: <code>${esc(it.answer)}</code></p><p class="muted small">Tente captar as palavras-chave: ${it.keywords.join(', ')}.</p></div>`;addXP(ok?12:5,ok?'listening':'tentativa de listening');}
function renderSpeaking(){document.getElementById('speaking').innerHTML=`<div class="card"><h2>Falar e ser avaliada</h2><p class="muted">O app usa o reconhecimento de fala do navegador. Ele avalia se suas palavras principais apareceram e dá feedback de estrutura. Não substitui uma professora, mas ajuda muito no treino diário.</p><div class="grid two">${APP.speakingPrompts.map((p,i)=>`<div class="card"><p>${tag(p.level)} ${tag('speaking','warn')}</p><h3>${esc(p.prompt)}</h3><p class="muted small">${esc(p.tip)}</p><button class="btn" onclick="speakText(${JSON.stringify(p.prompt).replace(/"/g,'&quot;')})">Ouvir pergunta</button><button class="btn secondary" onclick="startSpeech(${i})">Gravar resposta</button><textarea id="speechText${i}" placeholder="Sua fala aparecerá aqui. Você também pode digitar." style="margin-top:10px"></textarea><button class="btn good" onclick="scoreSpeech(${i})">Avaliar fala</button><div id="speechFb${i}"></div></div>`).join('')}</div></div>`;}
function startSpeech(i){let SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Reconhecimento de fala não disponível neste navegador.');return;}let rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.onresult=e=>{document.getElementById('speechText'+i).value=e.results[0][0].transcript;};rec.onerror=()=>toast('Não consegui captar. Tente de novo em local silencioso.');rec.start();}
function scoreSpeech(i){let p=APP.speakingPrompts[i],txt=(document.getElementById('speechText'+i).value||'').toLowerCase();let hits=p.keywords.filter(k=>txt.includes(k.toLowerCase())).length;let pct=Math.round(hits/Math.min(p.keywords.length,5)*100);let xpGain=pct>=60?18:8;document.getElementById('speechFb'+i).innerHTML=`<div class="feedback"><strong>${pct>=60?'Boa fala!':'Continue treinando.'}</strong><p>Palavras-chave encontradas: ${hits}/${p.keywords.length}</p><p><strong>Foco:</strong> ${esc(p.tip)}</p><p class="muted small">Dica: fale frases completas. Ex: “I work in my field, I go to the gym, and I study English at night.”</p></div>`;addXP(xpGain,'speaking');}
function renderConversation(){let chat=APP.state.chat||[];document.getElementById('conversation').innerHTML=`<div class="card"><h2>Conversar com a Maya</h2><p class="muted">Conversa leve em inglês. A Maya corrige de forma simples e puxa assunto de rotina, viagem, filmes e trabalho.</p><div class="chat" id="chatBox">${chat.length?chat.map(m=>`<div class="msg ${m.role==='user'?'user':'bot'}">${esc(m.text)}</div>`).join(''):`<div class="msg bot">Hi! I’m Maya. Let’s practice. Tell me: what did you do yesterday?</div>`}</div><div class="row" style="margin-top:10px"><input class="input" id="chatInput" placeholder="Write in English..." onkeydown="if(event.key==='Enter')sendChat()"><button class="btn" onclick="sendChat()">Enviar</button><button class="btn secondary" onclick="speakText(document.getElementById('chatBox').innerText)">Ouvir conversa</button><button class="btn secondary" onclick="clearChat()">Limpar</button></div></div>`;}
function mayaReply(text){let t=text.toLowerCase();let corrections=[];if(t.includes("i'm sleeping")||t.includes('i am sleeping')&&t.includes('yesterday'))corrections.push('Use past for yesterday: “Yesterday, I slept...”');if(t.includes('grow my speak'))corrections.push('More natural: “improve my speaking”.');if(t.includes('i no ')||t.includes('i not '))corrections.push('Use “I don’t + verb”: “I don’t understand.”');if(t.includes('can speaks'))corrections.push('After can, use base verb: “can speak”.');let follow=['Nice! Can you add one reason using “because”?','Good. Now say the same idea in the past tense.','Great. Try to make it more natural with one connector: because, but, so.','Cool! Can you give me one example?'][Math.floor(Math.random()*4)];return (corrections.length?`Small correction: ${corrections.join(' ')} `:'Good job! ')+follow;}
function sendChat(){let input=document.getElementById('chatInput'),text=(input.value||'').trim();if(!text)return;APP.state.chat=APP.state.chat||[];APP.state.chat.push({role:'user',text});APP.state.chat.push({role:'bot',text:mayaReply(text)});input.value='';save();renderConversation();addXP(6,'conversa');setTimeout(()=>{let box=document.getElementById('chatBox');box.scrollTop=box.scrollHeight;},20);}
function clearChat(){APP.state.chat=[];save();renderConversation();}
function renderReview(){let exams=APP.state.exams||[];let weak=Object.entries(APP.state.weak||{}).sort((a,b)=>b[1]-a[1]);document.getElementById('review').innerHTML=`<div class="grid two"><div class="card"><h2>Avaliação quinzenal</h2><p class="muted">A cada 14 dias, faça uma prova que relembra tudo que apareceu até agora. Ela mistura verbos, tempos, estrutura, vocabulário natural e inglês de filmes.</p><p>${tag('Dia '+day())} ${tag(day()%14===0?'Dia ideal de avaliação':'Pode simular quando quiser','warn')}</p><button class="btn" onclick="startExam('biweekly')">Fazer avaliação quinzenal agora</button></div><div class="card"><h2>Revisão dos pontos fracos</h2>${weak.length?weak.map(w=>`<p>${tag(w[0],'bad')} errou ${w[1]} vez(es) — refaça treino de ${w[0]}.</p>`).join(''):'<p class="muted">Ainda não há pontos fracos. Faça uma prova para gerar revisão.</p>'}<button class="btn secondary" onclick="resetWeak()">Zerar pontos fracos</button></div></div><div class="card" style="margin-top:16px"><h2>Histórico de provas</h2>${exams.length?`<table class="table"><thead><tr><th>Data</th><th>Prova</th><th>Resultado</th><th>XP</th></tr></thead><tbody>${exams.slice().reverse().map(e=>`<tr><td>${new Date(e.date).toLocaleDateString('pt-BR')}</td><td>${esc(e.title)}</td><td>${e.score}/${e.total} (${e.pct}%)</td><td>${e.xp}</td></tr>`).join('')}</tbody></table>`:'<p class="muted">Nenhuma prova feita ainda.</p>'}</div>`;}
function resetWeak(){APP.state.weak={};save();renderReview();}
function renderSettings(){let voices=window.speechSynthesis?speechSynthesis.getVoices():[];document.getElementById('settings').innerHTML=`<div class="card"><h2>Ajustes</h2><label>Voz feminina / voz em inglês disponível no seu celular</label><select id="voiceSelect" onchange="APP.state.voiceURI=this.value;save()"><option value="">Automática</option>${voices.map(v=>`<option value="${esc(v.voiceURI)}" ${APP.state.voiceURI===v.voiceURI?'selected':''}>${esc(v.name)} — ${esc(v.lang)}</option>`).join('')}</select><label style="display:block;margin-top:12px">Velocidade da voz: <span id="rateLabel">${APP.state.rate||.9}</span></label><input type="range" min="0.6" max="1.2" step="0.05" value="${APP.state.rate||.9}" oninput="APP.state.rate=Number(this.value);document.getElementById('rateLabel').textContent=this.value;save()"><div class="row" style="margin-top:14px"><button class="btn" onclick="speakText('Hi, I am Maya. Let us practice English together today.')">Testar voz</button><button class="btn secondary" onclick="APP.state.dayOffset+=1;save();renderAll()">Simular próximo dia</button><button class="btn danger" onclick="if(confirm('Apagar todo o progresso?')){localStorage.removeItem('levelupEnglishV2');location.reload()}">Zerar progresso</button></div><p class="footer-note">Microfone e voz dependem do navegador. No Android, Chrome costuma funcionar melhor. No iPhone, Safari/Chrome podem variar.</p></div>`;}
function renderAll(reRenderExam=true){renderDashboard();renderLevels();renderPlan();renderTraining();renderVerbs();renderTenses();renderListening();renderSpeaking();renderConversation();renderReview();renderSettings();if(exam&&reRenderExam)renderExam();}
initState();setupNav();renderAll();if('speechSynthesis'in window){speechSynthesis.onvoiceschanged=()=>renderSettings();}
window.startExam=startExam;window.showTab=showTab;window.selectOption=selectOption;window.checkAnswer=checkAnswer;window.nextQuestion=nextQuestion;window.cancelExam=cancelExam;window.verbFlash=verbFlash;window.speakText=speakText;window.checkListening=checkListening;window.startSpeech=startSpeech;window.scoreSpeech=scoreSpeech;window.sendChat=sendChat;window.clearChat=clearChat;window.resetWeak=resetWeak;
</script>
</body>
</html>
